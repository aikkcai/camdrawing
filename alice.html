const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const upload = document.getElementById('upload');
const colorInput = document.getElementById('color');
const sizeSlider = document.getElementById('size');
const posXSlider = document.getElementById('posX');
const posYSlider = document.getElementById('posY');
const opacitySlider = document.getElementById('opacity');
const rotateSlider = document.getElementById('rotate');

const sizeValue = document.getElementById('sizeValue');
const xValue = document.getElementById('xValue');
const yValue = document.getElementById('yValue');
const opacityValue = document.getElementById('opacityValue');
const rotateValue = document.getElementById('rotateValue');

let originalImg = null;

// 自動獲取 pattern 尺寸
const patternHeight = pattern.length;
const patternWidth = pattern[0].length;

function updateValues() {
    sizeValue.textContent = sizeSlider.value;
    xValue.textContent = posXSlider.value;
    yValue.textContent = posYSlider.value;
    opacityValue.textContent = parseFloat(opacitySlider.value).toFixed(2);
    rotateValue.textContent = rotateSlider.value;
}

function drawPattern(x, y, size, color, alpha, angle) {
    const scale = size / Math.max(patternWidth, patternHeight); // 根據最長邊縮放
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.globalAlpha = alpha;
    
    for (let py = 0; py < patternHeight; py++) {
        for (let px = 0; px < patternWidth; px++) {
            if (pattern[py][px] === 0) {
                ctx.fillStyle = color;
                ctx.fillRect(
                    px * scale - size/2, 
                    py * scale - size/2, 
                    scale, 
                    scale
                );
            }
        }
    }
    ctx.restore();
}

function redraw() {
    if (!originalImg) return;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(originalImg, 0, 0, canvas.width, canvas.height);
   
    const x = (posXSlider.value / 100) * canvas.width;
    const y = (posYSlider.value / 100) * canvas.height;
    const angle = parseFloat(rotateSlider.value) * Math.PI / 180;
    const size = parseInt(sizeSlider.value);
    const color = colorInput.value;
    const alpha = parseFloat(opacitySlider.value);
   
    drawPattern(x, y, size, color, alpha, angle);
}

// 事件監聽
upload.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
            originalImg = img;
            const maxW = window.innerWidth * 0.9;
            const maxH = window.innerHeight * 0.82;
            const ratio = Math.min(maxW / img.width, maxH / img.height);
            canvas.width = Math.floor(img.width * ratio);
            canvas.height = Math.floor(img.height * ratio);
            redraw();
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
};

[sizeSlider, posXSlider, posYSlider, opacitySlider, rotateSlider, colorInput].forEach(el => {
    el.addEventListener('input', () => {
        updateValues();
        redraw();
    });
});

document.getElementById('download').onclick = () => {
    if (!originalImg) {
        alert("請先上傳圖片！");
        return;
    }
    const link = document.createElement('a');
    link.download = '加水印圖片.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
};

updateValues();
</script>
