<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖片不變形 - 全屏分割觸控映射</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }
        .toolbar {
            background: #222;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        button, select {
            padding: 8px 14px;
            border-radius: 6px;
            border: none;
            font-size: 15px;
        }
        button {
            background: #09f;
            color: white;
            cursor: pointer;
        }
        #fileInput { display: none; }
        #canvas {
            flex: 1;
            background: #000;
            display: block;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="uploadBtn">上傳圖片</button>
        <select id="zoneSelect"></select>
        <input type="file" id="fileInput" accept="image/*">
    </div>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const zoneSelect = document.getElementById('zoneSelect');

let cw, ch;
let img = null;

// 圖片顯示參數（保持比例不變形）
let imgX = 0, imgY = 0, imgW = 0, imgH = 0;

// 分割數
const COLS = 3;
const ROWS = 2;

let zones = [];
let selectedZone = 0;
let fullScreenX = 0, fullScreenY = 0;

// 初始化畫布
function resizeCanvas() {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight - 56;
    createZones();
    updateImagePosition();
    draw();
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// 建立分割區（依據整個畫布）
function createZones() {
    zones = [];
    const zoneW = cw / COLS;
    const zoneH = ch / ROWS;
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            zones.push({
                x: c * zoneW, y: r * zoneH,
                w: zoneW, h: zoneH,
                cx: c * zoneW + zoneW/2,
                cy: r * zoneH + zoneH/2
            });
        }
    }
    initSelect();
}

function initSelect() {
    zoneSelect.innerHTML = '';
    zones.forEach((z,i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `分割區 ${i+1}`;
        zoneSelect.appendChild(opt);
    });
}

// 上傳圖片
uploadBtn.onclick = () => fileInput.click();
fileInput.onchange = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const image = new Image();
    image.onload = () => {
        img = image;
        updateImagePosition();
        draw();
    };
    image.src = URL.createObjectURL(f);
};

// 圖片等比例居中，不變形
function updateImagePosition() {
    if (!img) return;
    const ratio = Math.min(cw / img.width, ch / img.height);
    imgW = img.width * ratio;
    imgH = img.height * ratio;
    imgX = (cw - imgW) / 2;
    imgY = (ch - imgH) / 2;
}

// 選擇區域
zoneSelect.onchange = () => {
    selectedZone = parseInt(zoneSelect.value);
    draw();
};

// 繪製
function draw() {
    ctx.clearRect(0, 0, cw, ch);
    if (!img) return;

    // 繪製圖片（不變形 + 黑邊）
    ctx.drawImage(img, imgX, imgY, imgW, imgH);

    // 繪製紅色分割線
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 2;
    ctx.strokeRect(0,0,cw,ch);

    for (let i=1; i<COLS; i++) {
        const x = (cw/COLS)*i;
        ctx.beginPath();
        ctx.moveTo(x,0); ctx.lineTo(x,ch);
        ctx.stroke();
    }
    for (let i=1; i<ROWS; i++) {
        const y = (ch/ROWS)*i;
        ctx.beginPath();
        ctx.moveTo(0,y); ctx.lineTo(cw,y);
        ctx.stroke();
    }

    // 編號
    ctx.fillStyle = '#ff0000';
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    zones.forEach((z,i) => {
        ctx.fillText(i+1, z.cx, z.cy);
    });

    // 觸控點 全屏比例 → 映射到選中區域
    const z = zones[selectedZone];
    const ratioX = fullScreenX / cw;
    const ratioY = fullScreenY / ch;
    const lx = z.x + ratioX * z.w;
    const ly = z.y + ratioY * z.h;

    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(z.x, ly); ctx.lineTo(z.x+z.w, ly);
    ctx.moveTo(lx, z.y); ctx.lineTo(lx, z.y+z.h);
    ctx.stroke();
}

// 觸控 / 滑鼠
function updateTouch(e) {
    const rect = canvas.getBoundingClientRect();
    fullScreenX = e.clientX - rect.left;
    fullScreenY = e.clientY - rect.top;
    draw();
}

window.addEventListener('mousemove', updateTouch);
window.addEventListener('touchmove', (e) => {
    e.preventDefault();
    updateTouch(e.touches[0]);
});
</script>
</body>
</html>
