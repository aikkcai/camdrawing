<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全屏觸控映射 - 分割區定位</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }
        .toolbar {
            background: #222;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        button, select {
            padding: 8px 14px;
            border-radius: 6px;
            border: none;
            font-size: 15px;
        }
        button {
            background: #09f;
            color: white;
            cursor: pointer;
        }
        #fileInput { display: none; }
        #canvas {
            flex: 1;
            background: #000;
            display: block;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="uploadBtn">上傳圖片</button>
        <select id="zoneSelect"></select>
        <input type="file" id="fileInput" accept="image/*">
    </div>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const zoneSelect = document.getElementById('zoneSelect');

let cw, ch;
let img = null;

// ==== 分割數量 (可自行修改) ====
const COLS = 3;  // 橫向幾份
const ROWS = 2;  // 直向幾份

let zones = [];
let selectedZone = 0;

// 全屏觸控點
let fullScreenX = 0;
let fullScreenY = 0;

// 初始化畫布
function resizeCanvas() {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight - 56;
    createZones();
    draw();
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// 建立分割區
function createZones() {
    zones = [];
    const zoneW = cw / COLS;
    const zoneH = ch / ROWS;

    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            zones.push({
                x: c * zoneW,
                y: r * zoneH,
                w: zoneW,
                h: zoneH,
                cx: c * zoneW + zoneW / 2,
                cy: r * zoneH + zoneH / 2,
                index: zones.length
            });
        }
    }
    initSelect();
}

// 初始化下拉選單
function initSelect() {
    zoneSelect.innerHTML = '';
    zones.forEach((z, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `分割區 ${i + 1}`;
        zoneSelect.appendChild(opt);
    });
}

// 上傳圖片
uploadBtn.onclick = () => fileInput.click();
fileInput.onchange = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const image = new Image();
    image.onload = () => {
        img = image;
        draw();
    };
    image.src = URL.createObjectURL(f);
};

// 切換選擇分割區
zoneSelect.onchange = () => {
    selectedZone = parseInt(zoneSelect.value);
    draw();
};

// 繪製畫面
function draw() {
    ctx.clearRect(0, 0, cw, ch);
    if (!img) return;

    // 繪製圖片（始終滿屏）
    ctx.drawImage(img, 0, 0, cw, ch);

    // 繪製紅色分割線
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 2;
    ctx.strokeRect(0, 0, cw, ch);

    // 垂直分隔線
    for (let i = 1; i < COLS; i++) {
        const x = (cw / COLS) * i;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, ch);
        ctx.stroke();
    }
    // 水平分隔線
    for (let i = 1; i < ROWS; i++) {
        const y = (ch / ROWS) * i;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(cw, y);
        ctx.stroke();
    }

    // 繪製中央編號
    ctx.fillStyle = '#ff0000';
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    zones.forEach(z => {
        ctx.fillText(z.index + 1, z.cx, z.cy);
    });

    // ==============================================
    // 核心：全屏觸點 → 映射到「所選分割區」內的十字線
    // ==============================================
    const z = zones[selectedZone];
    if (!z) return;

    // 計算全屏觸點的【比例】
    const ratioX = fullScreenX / cw;
    const ratioY = fullScreenY / ch;

    // 把比例映射到「單一分割區」內
    const localX = z.x + ratioX * z.w;
    const localY = z.y + ratioY * z.h;

    // 繪製紅色十字
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(z.x, localY);
    ctx.lineTo(z.x + z.w, localY);
    ctx.moveTo(localX, z.y);
    ctx.lineTo(localX, z.y + z.h);
    ctx.stroke();
}

// ==============================================
// 監控觸控 / 滑鼠（整個螢幕）
// ==============================================
function updateTouchPoint(e) {
    const rect = canvas.getBoundingClientRect();
    fullScreenX = e.clientX - rect.left;
    fullScreenY = e.clientY - rect.top;
    draw();
}

// 滑鼠移動
window.addEventListener('mousemove', updateTouchPoint);

// 觸屏移動
window.addEventListener('touchmove', (e) => {
    e.preventDefault();
    updateTouchPoint(e.touches[0]);
});
</script>
</body>
</html>
