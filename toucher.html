<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能分割 - 鍵盤加縮放 + 自動增減分割</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }
        .toolbar {
            background: #222;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        button, select, input[type="range"] {
            padding: 8px 14px;
            border-radius: 6px;
            border: none;
            font-size: 15px;
        }
        button {
            background: #09f;
            color: white;
            cursor: pointer;
        }
        #fileInput { display: none; }
        #zoomSlider {
            width: 180px;
        }
        #canvas {
            flex: 1;
            background: #000;
            display: block;
        }

        #exitFullscreen {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,0,0,0.8);
            color: white;
            font-size: 18px;
            padding: 12px 24px;
            z-index: 9999;
            display: none;
        }
    </style>
</head>
<body>
    <div class="toolbar" id="toolbar">
        <button id="uploadBtn">上傳圖片</button>
        <button id="zoomOut">-</button>
        <button id="zoomIn">+</button>
        <input type="range" id="zoomSlider" min="10" max="300" value="100">
        
        <button id="btnUp">↑</button>
        <button id="btnDown">↓</button>
        <button id="btnLeft">←</button>
        <button id="btnRight">→</button>

        <button id="fullscreenBtn">全屏</button>
        <select id="zoneSelect"></select>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <button id="exitFullscreen">退出全屏</button>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const zoneSelect = document.getElementById('zoneSelect');
const zoomSlider = document.getElementById('zoomSlider');
const zoomInBtn = document.getElementById('zoomIn');
const zoomOutBtn = document.getElementById('zoomOut');

const btnUp = document.getElementById('btnUp');
const btnDown = document.getElementById('btnDown');
const btnLeft = document.getElementById('btnLeft');
const btnRight = document.getElementById('btnRight');

const toolbar = document.getElementById('toolbar');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const exitFullscreen = document.getElementById('exitFullscreen');

let cw, ch;
let img = null;

let imgX = 0, imgY = 0;
let imgW = 0, imgH = 0;
let zoom = 1;
let moveSpeed = 20;

// 自動分割核心參數
let COLS = 3;
let ROWS = 2;
const MIN_GRID = 1;
const MAX_GRID = 10;

let zones = [];
let selectedZone = 0;
let fullScreenX = 0, fullScreenY = 0;

let screenRatio = window.screen.width / window.screen.height;
let view = { x:0, y:0, w:0, h:0 };

// 初始化
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function resizeCanvas() {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight - (toolbar.style.display === 'none' ? 0 : 56);

    if (cw / ch > screenRatio) {
        view.h = ch;
        view.w = ch * screenRatio;
    } else {
        view.w = cw;
        view.h = cw / screenRatio;
    }
    view.x = (cw - view.w) / 2;
    view.y = (ch - view.h) / 2;

    createZones();
    updateImagePosition();
    draw();
}

// 建立分割
function createZones() {
    zones = [];
    const zoneW = view.w / COLS;
    const zoneH = view.h / ROWS;
    for (let r=0; r<ROWS; r++) {
        for (let c=0; c<COLS; c++) {
            const x = view.x + c * zoneW;
            const y = view.y + r * zoneH;
            zones.push({ x,y, w:zoneW, h:zoneH, cx:x+zoneW/2, cy:y+zoneH/2 });
        }
    }
    initSelect();
}

function initSelect() {
    zoneSelect.innerHTML = '';
    zones.forEach((z,i)=>{
        const opt=document.createElement('option');
        opt.value=i;
        opt.textContent=`分割 ${i+1}`;
        zoneSelect.appendChild(opt);
    });
}

// 上傳圖片
uploadBtn.onclick = ()=>fileInput.click();
fileInput.onchange = (e)=>{
    const f=e.target.files[0];
    if(!f)return;
    const im=new Image();
    im.onload=()=>{
        img=im; zoom=1; zoomSlider.value=100; imgX=imgY=0;
        updateImagePosition(); autoAdjustGrid(); draw();
    };
    im.src=URL.createObjectURL(f);
};

// 圖片尺寸
function updateImagePosition() {
    if(!img)return;
    const r=Math.min(view.w/img.width, view.h/img.height)*zoom;
    imgW=img.width*r;
    imgH=img.height*r;
}

// 縮放控制
function doZoom(change) {
    zoom=Math.max(0.1, Math.min(3, zoom+change));
    zoomSlider.value=zoom*100;
    updateImagePosition();
    autoAdjustGrid();
    draw();
}

zoomInBtn.onclick=()=>doZoom(0.1);
zoomOutBtn.onclick=()=>doZoom(-0.1);
zoomSlider.oninput=()=>{
    zoom=zoomSlider.value/100;
    updateImagePosition();
    autoAdjustGrid();
    draw();
};

// ==========================
// 核心：自動增減分割
// ==========================
function autoAdjustGrid() {
    if(!img)return;
    
    const imgRatio=img.width/img.height;
    const totalW=imgW;
    const totalH=imgH;
    const cellW=view.w/COLS;
    const cellH=view.h/ROWS;

    let needCols=Math.max(MIN_GRID, Math.min(MAX_GRID, Math.ceil(totalW/cellW)));
    let needRows=Math.max(MIN_GRID, Math.min(MAX_GRID, Math.ceil(totalH/cellH)));

    if(needCols!==COLS || needRows!==ROWS) {
        COLS=needCols;
        ROWS=needRows;
        createZones();
    }
}

// 移動
btnUp.onclick=()=>{imgY-=moveSpeed; draw();}
btnDown.onclick=()=>{imgY+=moveSpeed; draw();}
btnLeft.onclick=()=>{imgX-=moveSpeed; draw();}
btnRight.onclick=()=>{imgX+=moveSpeed; draw();}

// ==========================
// 鍵盤 + - 控制縮放 + 自動分割
// ==========================
window.addEventListener('keydown',(e)=>{
    if(!img)return;
    if(e.key==='+'||e.key==='='){
        doZoom(0.1);
    }else if(e.key==='-'||e.key==='_'){
        doZoom(-0.1);
    }

    switch(e.key){
        case 'ArrowUp':imgY-=moveSpeed; break;
        case 'ArrowDown':imgY+=moveSpeed; break;
        case 'ArrowLeft':imgX-=moveSpeed; break;
        case 'ArrowRight':imgX+=moveSpeed; break;
    }
    draw();
});

// 全屏
fullscreenBtn.onclick=()=>{
    toolbar.style.display='none';
    exitFullscreen.style.display='block';
    resizeCanvas();
};
exitFullscreen.onclick=()=>{
    toolbar.style.display='flex';
    exitFullscreen.style.display='none';
    resizeCanvas();
};

zoneSelect.onchange=()=>{selectedZone=parseInt(zoneSelect.value); draw();}

// 繪製
function draw() {
    ctx.clearRect(0,0,cw,ch);
    if(!img)return;

    ctx.drawImage(img, view.x+imgX, view.y+imgY, imgW, imgH);

    ctx.strokeStyle='#ff0000'; ctx.lineWidth=2;
    ctx.strokeRect(view.x,view.y,view.w,view.h);

    for(let i=1;i<COLS;i++){
        const x=view.x+view.w/COLS*i;
        ctx.beginPath(); ctx.moveTo(x,view.y); ctx.lineTo(x,view.y+view.h); ctx.stroke();
    }
    for(let i=1;i<ROWS;i++){
        const y=view.y+view.h/ROWS*i;
        ctx.beginPath(); ctx.moveTo(view.x,y); ctx.lineTo(view.x+view.w,y); ctx.stroke();
    }

    ctx.fillStyle='#ff0000'; ctx.font='bold 28px Arial'; ctx.textAlign='center';
    zones.forEach((z,i)=>ctx.fillText(i+1,z.cx,z.cy));

    const rx=(fullScreenX-view.x)/view.w;
    const ry=(fullScreenY-view.y)/view.h;
    const z=zones[selectedZone];
    const lx=z.x+rx*z.w;
    const ly=z.y+ry*z.h;

    ctx.beginPath();
    ctx.moveTo(z.x,ly); ctx.lineTo(z.x+z.w,ly);
    ctx.moveTo(lx,z.y); ctx.lineTo(lx,z.y+z.h);
    ctx.stroke();
}

// 觸控
function updateTouch(e) {
    const rect=canvas.getBoundingClientRect();
    fullScreenX=e.clientX-rect.left;
    fullScreenY=e.clientY-rect.top;
    draw();
}

window.addEventListener('mousemove',updateTouch);
window.addEventListener('touchmove',(e)=>{
    e.preventDefault(); updateTouch(e.touches[0]);
});
</script>
</body>
</html>
