<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大觸屏 - 分割圖板控制</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #111;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: #fff;
        }
        .toolbar {
            background: #222;
            padding: 10px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        button, select {
            padding: 8px 14px;
            border-radius: 6px;
            border: none;
            font-size: 15px;
        }
        button {
            background: #09f;
            color: white;
            cursor: pointer;
        }
        #fileInput { display: none; }
        #canvas {
            flex: 1;
            background: #000;
            display: block;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="uploadBtn">上傳圖片1</button>
        <select id="zoneSelect"></select>
        <input type="file" id="fileInput" accept="image/*">
    </div>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const zoneSelect = document.getElementById('zoneSelect');

let cw, ch;
let img = null;

// 你可以自由修改行列數
const COLS = 3;
const ROWS = 2;

let zones = [];
let selectedZone = 0;

// 每個區塊的圖片偏移（觸控控制）
let zoneOffsets = [];

// 觸控點
let touchX = 0, touchY = 0;

// 初始化畫布
function resize() {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight - 55;
    createZones();
    draw();
}
resize();
window.addEventListener('resize', resize);

// 建立所有分割區域
function createZones() {
    zones = [];
    zoneOffsets = [];
    const zoneW = cw / COLS;
    const zoneH = ch / ROWS;

    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            zones.push({
                x: c * zoneW,
                y: r * zoneH,
                w: zoneW,
                h: zoneH,
                cx: c * zoneW + zoneW / 2,
                cy: r * zoneH + zoneH / 2,
                index: zones.length
            });
            zoneOffsets.push({ x: 0, y: 0 });
        }
    }
    initSelect();
}

// 初始化下拉選單
function initSelect() {
    zoneSelect.innerHTML = '';
    zones.forEach((z, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `控制區塊 ${i + 1}`;
        zoneSelect.appendChild(opt);
    });
}

// 上傳圖片
uploadBtn.onclick = () => fileInput.click();
fileInput.onchange = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const im = new Image();
    im.onload = () => {
        img = im;
        zones.forEach((_, i) => { zoneOffsets[i] = { x: 0, y: 0 }; });
        draw();
    };
    im.src = URL.createObjectURL(f);
};

// 切換控制區塊
zoneSelect.onchange = () => {
    selectedZone = parseInt(zoneSelect.value);
};

// 繪製
function draw() {
    ctx.clearRect(0, 0, cw, ch);
    if (!img) return;

    zones.forEach((z, idx) => {
        ctx.save();
        ctx.rect(z.x, z.y, z.w, z.h);
        ctx.clip();

        // 繪製該區塊的圖片（可被觸控移動）
        const ox = zoneOffsets[idx].x;
        const oy = zoneOffsets[idx].y;
        ctx.drawImage(img, z.x + ox, z.y + oy, z.w, z.h);

        ctx.restore();
    });

    // 繪製紅色分割線
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 2;
    ctx.strokeRect(0, 0, cw, ch);

    for (let i = 1; i < COLS; i++) {
        const x = (cw / COLS) * i;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, ch);
        ctx.stroke();
    }
    for (let i = 1; i < ROWS; i++) {
        const y = (ch / ROWS) * i;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(cw, y);
        ctx.stroke();
    }

    // 繪製編號
    ctx.fillStyle = '#ff0000';
    ctx.font = 'bold 30px Arial';
    ctx.textAlign = 'center';
    zones.forEach(z => {
        ctx.fillText(z.index + 1, z.cx, z.cy);
    });

    // 繪製當前控制區塊的十字線
    const z = zones[selectedZone];
    const localX = touchX;
    const localY = touchY;

    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(z.x, localY);
    ctx.lineTo(z.x + z.w, localY);
    ctx.moveTo(localX, z.y);
    ctx.lineTo(localX, z.y + z.h);
    ctx.stroke();
}

// 觸控 / 滑鼠控制
function updateTouch(e) {
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;

    const z = zones[selectedZone];

    // 計算觸控在區塊內的相對位置
    const rx = (sx - z.x) / z.w;
    const ry = (sy - z.y) / z.h;

    // 讓圖片對應移動
    zoneOffsets[selectedZone].x = (rx - 0.5) * z.w;
    zoneOffsets[selectedZone].y = (ry - 0.5) * z.h;

    // 十字線跟隨觸控
    touchX = sx;
    touchY = sy;

    draw();
}

// 滑鼠
canvas.addEventListener('mousemove', updateTouch);

// 觸屏
canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    updateTouch(e.touches[0]);
});
</script>
</body>
</html>
