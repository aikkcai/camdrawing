<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖片分割觸控定位</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            color: white;
        }
        .toolbar {
            background: #2d2d2d;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        button, select {
            padding: 8px 14px;
            border-radius: 4px;
            border: none;
            font-size: 15px;
        }
        button {
            background: #0099ff;
            color: white;
            cursor: pointer;
        }
        #fileInput {
            display: none;
        }
        #canvas {
            flex: 1;
            background: #000;
            display: block;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="uploadBtn">上傳圖片</button>
        <select id="zoneSelect">
            <option value="1">區域 1</option>
        </select>
        <input type="file" id="fileInput" accept="image/*">
    </div>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const zoneSelect = document.getElementById('zoneSelect');

let cw, ch;
let img = null;

// 分割設定：依照螢幕比例分割
const COLS = 3;   // 橫向3區
const ROWS = 2;   // 直向2區
let zones = [];
let selectedZone = 0;

let touchX = 0, touchY = 0;
let showCross = false;

// 畫布滿屏
function resize() {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight - 55;
    createZones();
    draw();
}
resize();
window.addEventListener('resize', resize);

// 建立所有分割區域
function createZones() {
    zones = [];
    const w = cw / COLS;
    const h = ch / ROWS;

    for (let r=0; r<ROWS; r++) {
        for (let c=0; c<COLS; c++) {
            zones.push({
                x: c * w,
                y: r * h,
                w: w,
                h: h,
                cx: c * w + w/2,
                cy: r * h + h/2,
                index: zones.length
            });
        }
    }
}

// 上傳圖片
uploadBtn.onclick = () => fileInput.click();
fileInput.onchange = (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const im = new Image();
    im.onload = () => {
        img = im;
        draw();
    };
    im.src = URL.createObjectURL(f);
};

// 選擇區域
zoneSelect.onchange = () => {
    selectedZone = parseInt(zoneSelect.value);
    draw();
};

// 繪製
function draw() {
    ctx.clearRect(0,0,cw,ch);
    if (!img) return;

    // 繪製圖片（滿屏等比）
    ctx.drawImage(img, 0,0,cw,ch);

    // 繪製紅色分割線
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 2;
    ctx.strokeRect(0,0,cw,ch);

    // 直向分割線
    for (let i=1; i<COLS; i++) {
        const x = (cw/COLS)*i;
        ctx.beginPath();
        ctx.moveTo(x,0);
        ctx.lineTo(x,ch);
        ctx.stroke();
    }
    // 橫向分割線
    for (let i=1; i<ROWS; i++) {
        const y = (ch/ROWS)*i;
        ctx.beginPath();
        ctx.moveTo(0,y);
        ctx.lineTo(cw,y);
        ctx.stroke();
    }

    // 繪製中央編號
    ctx.fillStyle = '#ff0000';
    ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center';
    zones.forEach(z => {
        ctx.fillText(z.index+1, z.cx, z.cy);
    });

    // 在所選區域畫十字
    if (showCross && zones[selectedZone]) {
        const z = zones[selectedZone];
        const rx = (touchX - z.x) / z.w;
        const ry = (touchY - z.y) / z.h;

        const fx = z.x + rx * z.w;
        const fy = z.y + ry * z.h;

        ctx.strokeStyle = '#ff0000';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(z.x, fy);
        ctx.lineTo(z.x+z.w, fy);
        ctx.moveTo(fx, z.y);
        ctx.lineTo(fx, z.y+z.h);
        ctx.stroke();
    }
}

// 觸控 / 滑鼠
function updateTouch(e) {
    const rect = canvas.getBoundingClientRect();
    touchX = e.clientX - rect.left;
    touchY = e.clientY - rect.top;
    showCross = true;
    draw();
}

// 滑鼠
canvas.addEventListener('mousemove', updateTouch);

// 觸屏
canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    updateTouch(e.touches[0]);
});

// 初始化選單
function initSelect() {
    zoneSelect.innerHTML = '';
    zones.forEach(z => {
        const opt = document.createElement('option');
        opt.value = z.index;
        opt.textContent = `區域 ${z.index+1}`;
        zoneSelect.appendChild(opt);
    });
}

// 啟動
setTimeout(() => {
    createZones();
    initSelect();
    draw();
}, 100);
</script>
</body>
</html>
