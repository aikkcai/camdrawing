<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紅外觸屏 - 圖片精準十字定位</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #222;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .bar {
            background: #333;
            padding: 10px;
            display: flex;
            gap: 8px;
        }
        button {
            padding: 8px 12px;
            background: #09f;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #fileInput { display: none; }
        #canvas {
            flex: 1;
            background: #000;
            display: block;
        }
    </style>
</head>
<body>
    <div class="bar">
        <button id="upload">載入圖片</button>
        <button id="zoomIn">放大 +</button>
        <button id="zoomOut">縮小 -</button>
        <input type="file" id="fileInput" accept="image/*">
    </div>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let cw, ch;

// 圖片狀態
let img = null;
let scale = 1;
let offsetX = 0;
let offsetY = 0;

// 觸摸 / 滑鼠
let isDrag = false;
let lastX, lastY;
let crossScreenX = 0, crossScreenY = 0;

// 視窗大小
function resize() {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight - 50;
    draw();
}
resize();
window.addEventListener('resize', resize);

// 上傳圖片
document.getElementById('upload').onclick = () => fileInput.click();
fileInput.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    const im = new Image();
    im.onload = () => {
        img = im;
        scale = 1;
        offsetX = (cw - img.width) / 2;
        offsetY = (ch - img.height) / 2;
        draw();
    };
    im.src = URL.createObjectURL(f);
};

// 放大縮小
document.getElementById('zoomIn').onclick = () => { scale *= 1.1; draw(); };
document.getElementById('zoomOut').onclick = () => { scale /= 1.1; draw(); };
window.addEventListener('keydown', e => {
    if (e.key === '+') scale *= 1.1;
    if (e.key === '-') scale /= 1.1;
    draw();
});

// 畫圖
function draw() {
    ctx.clearRect(0, 0, cw, ch);
    if (!img) return;

    // 畫圖片
    ctx.save();
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);
    ctx.drawImage(img, 0, 0);
    ctx.restore();

    // 畫十字線
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, crossScreenY);
    ctx.lineTo(cw, crossScreenY);
    ctx.moveTo(crossScreenX, 0);
    ctx.lineTo(crossScreenX, ch);
    ctx.stroke();
}

// 螢幕座標 → 轉 → 圖片內部座標
function screenToImage(sx, sy) {
    return {
        x: (sx - offsetX) / scale,
        y: (sy - offsetY) / scale
    };
}
// 圖片內部座標 → 轉 → 螢幕座標
function imageToScreen(ix, iy) {
    return {
        x: ix * scale + offsetX,
        y: iy * scale + offsetY
    };
}

// 滑鼠 / 觸控移動
function onMove(e) {
    const rect = canvas.getBoundingClientRect();
    const sx = e.clientX - rect.left;
    const sy = e.clientY - rect.top;

    crossScreenX = sx;
    crossScreenY = sy;

    if (isDrag && img) {
        offsetX += sx - lastX;
        offsetY += sy - lastY;
    }
    lastX = sx;
    lastY = sy;
    draw();
}

// 滑鼠
canvas.addEventListener('mousedown', e => { isDrag = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', () => isDrag = false);

// 觸屏
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    isDrag = true;
    const t = e.touches[0];
    lastX = t.clientX;
    lastY = t.clientY;
});
window.addEventListener('touchmove', e => {
    e.preventDefault();
    onMove(e.touches[0]);
});
window.addEventListener('touchend', () => isDrag = false);

draw();
</script>
</body>
</html>
