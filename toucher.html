<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多觸屏拼接 - 映射計算十字線</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #111;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .toolbar {
            background: #222;
            padding: 10px;
            display: flex;
            gap: 8px;
        }
        button {
            padding: 8px 14px;
            background: #0099ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #fileInput { display: none; }
        #canvas {
            flex: 1;
            background: #000;
            display: block;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="btnUpload">載入圖片1.0</button>
        <button id="btnZoomIn">放大 +</button>
        <button id="btnZoomOut">縮小 -</button>
        <input type="file" id="fileInput" accept="image/*">
    </div>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let cw, ch;

// 圖片與操作
let img = null;
let scale = 1;
let offsetX = 0;
let offsetY = 0;
let isDragging = false;
let lastX, lastY;

// 觸點：最終計算出來的十字交點
let crossX = 0;
let crossY = 0;

// ======================
// 畫布適應螢幕
// ======================
function resizeCanvas() {
    cw = canvas.width = window.innerWidth;
    ch = canvas.height = window.innerHeight - 50;
    draw();
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ======================
// 圖片上傳
// ======================
btnUpload.onclick = () => fileInput.click();
fileInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const im = new Image();
    im.onload = () => {
        img = im;
        scale = 1;
        offsetX = (cw - img.width) / 2;
        offsetY = (ch - img.height) / 2;
        draw();
    };
    im.src = URL.createObjectURL(file);
};

// ======================
// 放大 / 縮小
// ======================
btnZoomIn.onclick = () => { scale *= 1.1; draw(); }
btnZoomOut.onclick = () => { scale /= 1.1; draw(); }
window.addEventListener('keydown', e => {
    if (e.key === '+' || e.key === '=') scale *= 1.1;
    if (e.key === '-' || e.key === '_') scale /= 1.1;
    draw();
});

// ======================
// 核心：映射計算
// ======================
// 模擬：多塊紅外觸屏 → 計算出「邏輯大畫面」的座標
function calcTouchPoint(touchClientX, touchClientY) {
    const rect = canvas.getBoundingClientRect();
    // 1. 先拿到當前螢幕相對 Canvas 的位置
    let sx = touchClientX - rect.left;
    let sy = touchClientY - rect.top;

    // ======================
    // 你真正的計算寫在這裡
    // 多塊觸屏拼接 → 映射到大畫面 Canvas
    // ======================
    // 示例：簡單映射（你可改成你的拼接算法）
    let mappedX = sx;
    let mappedY = sy;

    return { x: mappedX, y: mappedY };
}

// ======================
// 螢幕 → 圖片座標轉換
// ======================
function screenToImage(sx, sy) {
    return {
        x: (sx - offsetX) / scale,
        y: (sy - offsetY) / scale
    };
}

// ======================
// 繪製：圖片 + 計算後的十字
// ======================
function draw() {
    ctx.clearRect(0, 0, cw, ch);
    if (!img) return;

    // 繪製圖片（拖動 & 縮放）
    ctx.save();
    ctx.translate(offsetX, offsetY);
    ctx.scale(scale, scale);
    ctx.drawImage(img, 0, 0);
    ctx.restore();

    // 繪製「計算後」的十字線
    ctx.strokeStyle = '#ff3333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, crossY);
    ctx.lineTo(cw, crossY);
    ctx.moveTo(crossX, 0);
    ctx.lineTo(crossX, ch);
    ctx.stroke();
}

// ======================
// 觸控 / 滑鼠輸入
// ======================
function handleMove(e) {
    // 1. 取得原始觸點
    const clientX = e.clientX;
    const clientY = e.clientY;

    // 2. **計算映射** 得到最終十字位置（多觸屏拼接邏輯）
    const pt = calcTouchPoint(clientX, clientY);
    crossX = pt.x;
    crossY = pt.y;

    // 拖動圖片
    if (isDragging) {
        offsetX += clientX - lastX;
        offsetY += clientY - lastY;
    }
    lastX = clientX;
    lastY = clientY;

    draw();
}

// 滑鼠
canvas.addEventListener('mousedown', e => { isDragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', () => isDragging = false);

// 觸屏
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    isDragging = true;
    const t = e.touches[0];
    lastX = t.clientX;
    lastY = t.clientY;
});
window.addEventListener('touchmove', e => {
    e.preventDefault();
    handleMove(e.touches[0]);
});
window.addEventListener('touchend', () => isDragging = false);

draw();
</script>
</body>
</html>
