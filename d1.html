<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖片Canvas編輯器 - 油畫模式</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#10B981',
                        accent: '#F59E0B',
                        danger: '#EF4444',
                    }
                }
            }
        }
    </script>
    <style>
        @layer utilities {
            .canvas-container {
                @apply relative w-full h-[75vh] bg-gray-100 rounded-lg overflow-hidden shadow-lg border border-gray-200;
            }
            .control-panel {
                @apply bg-white p-4 rounded-lg shadow-md flex flex-wrap gap-4 items-center justify-between mb-4;
            }
            .btn {
                @apply px-4 py-2 rounded-md font-medium transition-all duration-200 flex items-center gap-2;
            }
            .btn-primary { @apply bg-primary text-white hover:bg-primary/90; }
            .btn-secondary { @apply bg-secondary text-white hover:bg-secondary/90; }
            .btn-accent { @apply bg-accent text-white hover:bg-accent/90; }
            .btn-danger { @apply bg-danger text-white hover:bg-danger/90; }
            .btn-outline { @apply border border-gray-300 hover:bg-gray-100; }
            
            .crosshair-line {
                position: fixed;
                pointer-events: none;
                z-index: 50;
                opacity: 0.6;
            }
            .floating-lock-btn {
                @apply fixed top-4 right-4 z-50 opacity-0 pointer-events-none transition-all duration-300;
            }
            .show-lock-btn {
                @apply opacity-100 pointer-events-auto;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <!-- 十字線 -->
    <div id="horizontal-line" class="crosshair-line h-[1px] w-full bg-red-500"></div>
    <div id="vertical-line" class="crosshair-line w-[1px] h-full bg-red-500"></div>

    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <div class="flex justify-between items-center mb-4">
            <h1 class="text-3xl font-bold text-gray-800">圖片 Canvas 編輯器 - 油畫效果</h1>
        </div>

        <!-- 控制面板 -->
        <div id="controlPanel" class="control-panel">
            <div class="flex flex-wrap gap-3">
                <label for="imageUpload" class="btn btn-primary cursor-pointer">
                    <i class="fa fa-upload"></i> 上傳圖片
                </label>
                <input type="file" id="imageUpload" accept="image/*" class="hidden">

                <button id="resetBtn" class="btn btn-outline">
                    <i class="fa fa-refresh"></i> 重置視圖
                </button>

                <button id="lockBtn" class="btn btn-accent locked">
                    <i class="fa fa-lock lock-icon"></i> <span>進入全屏鎖定</span>
                </button>

                <button id="applyOilBtn" class="btn btn-secondary">
                    <i class="fa fa-paint-brush"></i> 套用油畫效果
                </button>
            </div>

            <!-- 縮放控制 -->
            <div class="flex items-center gap-3">
                <button id="disSlider" class="btn btn-outline">
                    <i class="fa fa-search-minus"></i>
                </button>
                <input type="range" id="zoomSlider" min="0.1" max="20" step="0.05" value="1" class="w-48">
                <button id="inSlider" class="btn btn-outline">
                    <i class="fa fa-search-plus"></i>
                </button>
                <span id="zoomValue" class="text-sm font-medium text-gray-700 w-20 text-center">100%</span>
            </div>
        </div>

        <!-- 油畫參數面板 -->
        <div class="bg-white p-5 rounded-lg shadow-md mb-4 grid grid-cols-2 md:grid-cols-4 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">筆觸大小</label>
                <select id="brushSize" class="w-full p-2 border rounded-lg">
                    <option value="2">極細 (2)</option>
                    <option value="3">很細 (3)</option>
                    <option value="5" selected>細膩 (5)</option>
                    <option value="8">中等 (8)</option>
                    <option value="12">粗獷 (12)</option>
                    <option value="18">厚重 (18)</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">色彩冷暖</label>
                <select id="warmth" class="w-full p-2 border rounded-lg">
                    <option value="-40">非常冷</option>
                    <option value="-20">偏冷</option>
                    <option value="0" selected>中性</option>
                    <option value="20">偏暖</option>
                    <option value="40">非常暖</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">對比度</label>
                <select id="contrast" class="w-full p-2 border rounded-lg">
                    <option value="60">低</option>
                    <option value="80">稍低</option>
                    <option value="100" selected>標準</option>
                    <option value="130">高</option>
                    <option value="160">極高</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">亮度</label>
                <select id="brightness" class="w-full p-2 border rounded-lg">
                    <option value="-60">很暗</option>
                    <option value="-30">偏暗</option>
                    <option value="0" selected>正常</option>
                    <option value="30">偏亮</option>
                    <option value="60">很亮</option>
                </select>
            </div>
        </div>

        <!-- 畫布區域 -->
        <div id="canvasContainer" class="canvas-container">
            <canvas id="imageCanvas"></canvas>
            <div id="dropZone" class="absolute inset-0 flex items-center justify-center text-gray-400 text-lg">
                <div class="text-center">
                    <i class="fa fa-cloud-upload text-6xl mb-4"></i>
                    <p>拖放圖片到這裡或點擊上方上傳按鈕</p>
                </div>
            </div>

            <!-- 浮動解鎖按鈕 -->
            <button id="floatingLockBtn" class="floating-lock-btn btn btn-danger">
                <i class="fa fa-unlock"></i> <span>退出全屏</span>
            </button>
        </div>
    </div>

    <script>
        // ==================== 原始編輯器核心 ====================
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const canvasContainer = document.getElementById('canvasContainer');
        const zoomSlider = document.getElementById('zoomSlider');
        const zoomValue = document.getElementById('zoomValue');
        const imageUpload = document.getElementById('imageUpload');
        const resetBtn = document.getElementById('resetBtn');
        const lockBtn = document.getElementById('lockBtn');
        const floatingLockBtn = document.getElementById('floatingLockBtn');
        const dropZone = document.getElementById('dropZone');
        const applyOilBtn = document.getElementById('applyOilBtn');

        let image = null;
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false;
        let lastX, lastY;
        let isLocked = false;
        let isFullscreen = false;
        let originalImageData = null;   // 用來套用油畫效果的原始資料

        // 油畫參數
        const brushSizeSelect = document.getElementById('brushSize');
        const warmthSelect = document.getElementById('warmth');
        const contrastSelect = document.getElementById('contrast');
        const brightnessSelect = document.getElementById('brightness');

        function resizeCanvas() {
            if (isFullscreen) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            } else {
                canvas.width = canvasContainer.clientWidth;
                canvas.height = canvasContainer.clientHeight;
            }
            drawImage();
        }

        function loadImage(img) {
            image = img;
            originalImageData = null;
            resetView();
            dropZone.classList.add('hidden');
        }

        function drawImage() {
            if (!image) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const imgWidth = image.width * scale;
            const imgHeight = image.height * scale;
            const drawX = (canvas.width - imgWidth) / 2 + offsetX;
            const drawY = (canvas.height - imgHeight) / 2 + offsetY;

            ctx.drawImage(image, drawX, drawY, imgWidth, imgHeight);
        }

        function resetView() {
            scale = Math.min(
                canvas.width / image.width * 0.9,
                canvas.height / image.height * 0.9
            );
            offsetX = 0;
            offsetY = 0;
            zoomSlider.value = scale;
            updateZoomValue();
            drawImage();
        }

        function updateZoomValue() {
            zoomValue.textContent = `${Math.round(scale * 100)}%`;
        }

        // ==================== 油畫濾鏡核心 ====================
        function applyOilPaint(imageData, radius) {
            const width = imageData.width;
            const height = imageData.height;
            const pixels = imageData.data;
            const output = new Uint8ClampedArray(pixels.length);
            const r = Math.floor(radius);

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const count = new Array(256).fill(0);
                    const sumR = new Array(256).fill(0);
                    const sumG = new Array(256).fill(0);
                    const sumB = new Array(256).fill(0);

                    const minX = Math.max(0, x - r);
                    const maxX = Math.min(width - 1, x + r);
                    const minY = Math.max(0, y - r);
                    const maxY = Math.min(height - 1, y + r);

                    for (let ny = minY; ny <= maxY; ny++) {
                        for (let nx = minX; nx <= maxX; nx++) {
                            const i = (ny * width + nx) * 4;
                            const intensity = Math.floor((pixels[i] + pixels[i+1] + pixels[i+2]) / 3);
                            count[intensity]++;
                            sumR[intensity] += pixels[i];
                            sumG[intensity] += pixels[i+1];
                            sumB[intensity] += pixels[i+2];
                        }
                    }

                    let maxCount = 0, best = 0;
                    for (let i = 0; i < 256; i++) {
                        if (count[i] > maxCount) {
                            maxCount = count[i];
                            best = i;
                        }
                    }

                    const idx = (y * width + x) * 4;
                    output[idx]   = maxCount ? Math.floor(sumR[best] / maxCount) : 128;
                    output[idx+1] = maxCount ? Math.floor(sumG[best] / maxCount) : 128;
                    output[idx+2] = maxCount ? Math.floor(sumB[best] / maxCount) : 128;
                    output[idx+3] = 255;
                }
            }
            return output;
        }

        function applyAdjustments(data, warmth, contrast, brightness) {
            const output = new Uint8ClampedArray(data.length);
            const cf = contrast / 100;

            for (let i = 0; i < data.length; i += 4) {
                let r = data[i];
                let g = data[i + 1];
                let b = data[i + 2];

                // 對比度
                r = ((r/255 - 0.5) * cf + 0.5) * 255;
                g = ((g/255 - 0.5) * cf + 0.5) * 255;
                b = ((b/255 - 0.5) * cf + 0.5) * 255;

                // 亮度
                r += brightness;
                g += brightness;
                b += brightness;

                // 冷暖調整
                const warmOffset = warmth * 0.8;
                r += warmOffset * 1.2;
                b -= warmOffset * 1.1;

                output[i]   = Math.max(0, Math.min(255, Math.round(r)));
                output[i+1] = Math.max(0, Math.min(255, Math.round(g)));
                output[i+2] = Math.max(0, Math.min(255, Math.round(b)));
                output[i+3] = 255;
            }
            return output;
        }

        // 套用油畫效果（作用在目前畫布顯示的圖片）
        function applyOilEffect() {
            if (!image) return alert("請先上傳圖片");

            // 如果還沒有原始資料，先保存目前畫布內容
            if (!originalImageData) {
                originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            }

            const radius = parseFloat(brushSizeSelect.value);
            const warmth = parseFloat(warmthSelect.value);
            const contrast = parseFloat(contrastSelect.value);
            const brightness = parseFloat(brightnessSelect.value);

            // 先把目前畫布內容轉成 ImageData（包含縮放與偏移後的視圖）
            const currentData = ctx.getImageData(0, 0, canvas.width, canvas.height);

            const oilData = applyOilPaint(currentData, radius);
            const finalData = applyAdjustments(oilData, warmth, contrast, brightness);

            const newImageData = ctx.createImageData(canvas.width, canvas.height);
            newImageData.data.set(finalData);
            ctx.putImageData(newImageData, 0, 0);

            alert("油畫效果已套用！");
        }

        // ==================== 事件監聽 ====================
        imageUpload.addEventListener('change', e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const img = new Image();
                img.onload = () => loadImage(img);
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        });

        // 拖放上傳
        canvasContainer.addEventListener('drop', e => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = ev => {
                    const img = new Image();
                    img.onload = () => loadImage(img);
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
        canvasContainer.addEventListener('dragover', e => e.preventDefault());

        // 縮放
        zoomSlider.addEventListener('input', () => {
            if (isLocked) return;
            scale = parseFloat(zoomSlider.value);
            updateZoomValue();
            drawImage();
        });

        disSlider.addEventListener('click', () => {
            if (isLocked || scale <= 0.2) return;
            scale -= 0.1;
            zoomSlider.value = scale;
            updateZoomValue();
            drawImage();
        });

        inSlider.addEventListener('click', () => {
            if (isLocked) return;
            scale += 0.1;
            zoomSlider.value = scale;
            updateZoomValue();
            drawImage();
        });

        // 重置視圖
        resetBtn.addEventListener('click', () => {
            if (isLocked) return;
            resetView();
        });

        // 套用油畫
        applyOilBtn.addEventListener('click', applyOilEffect);

        // 鎖定 / 全屏模式
        function toggleLockMode() {
            isLocked = !isLocked;
            if (isLocked) {
                lockBtn.innerHTML = `<i class="fa fa-unlock"></i> <span>退出全屏</span>`;
                lockBtn.classList.add('btn-danger');
                lockBtn.classList.remove('btn-accent');
                floatingLockBtn.classList.add('show-lock-btn');
                controlPanel.classList.add('opacity-50', 'pointer-events-none');
                isFullscreen = true;
                resizeCanvas();
            } else {
                lockBtn.innerHTML = `<i class="fa fa-lock"></i> <span>進入全屏鎖定</span>`;
                lockBtn.classList.remove('btn-danger');
                lockBtn.classList.add('btn-accent');
                floatingLockBtn.classList.remove('show-lock-btn');
                controlPanel.classList.remove('opacity-50', 'pointer-events-none');
                isFullscreen = false;
                resizeCanvas();
            }
        }

        lockBtn.addEventListener('click', toggleLockMode);
        floatingLockBtn.addEventListener('click', toggleLockMode);

        // 滑鼠拖動（非鎖定模式）
        canvas.addEventListener('mousedown', e => {
            if (isLocked) return;
            isDragging = true;
            lastX = e.clientX - offsetX;
            lastY = e.clientY - offsetY;
        });

        canvas.addEventListener('mousemove', e => {
            if (!isDragging || isLocked) return;
            offsetX = e.clientX - lastX;
            offsetY = e.clientY - lastY;
            drawImage();
        });

        canvas.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('mouseleave', () => isDragging = false);

        // 滾輪縮放
        canvas.addEventListener('wheel', e => {
            if (isLocked) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const delta = e.deltaY > 0 ? -0.1 : 0.1;
            const newScale = Math.max(0.1, Math.min(20, scale + delta));

            // 保持鼠標指向點不動（縮放中心）
            const imgWidth = image.width * scale;
            const imgHeight = image.height * scale;
            const imgX = (canvas.width - imgWidth)/2 + offsetX;
            const imgY = (canvas.height - imgHeight)/2 + offsetY;

            offsetX += (mouseX - (canvas.width - image.width*newScale)/2 - offsetX) * (1 - newScale/scale);
            offsetY += (mouseY - (canvas.height - image.height*newScale)/2 - offsetY) * (1 - newScale/scale);

            scale = newScale;
            zoomSlider.value = scale;
            updateZoomValue();
            drawImage();
        });

        window.addEventListener('resize', resizeCanvas);

        // 初始化
        resizeCanvas();
    </script>
</body>
</html>
