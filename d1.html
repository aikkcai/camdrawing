<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片Canvas编辑器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#10B981',
                        accent: '#F59E0B',
                        danger: '#EF4444',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .canvas-container {
                @apply relative w-full h-[75vh] bg-gray-100 rounded-lg overflow-hidden shadow-lg border border-gray-200;
            }
            .control-panel {
                @apply bg-white p-4 rounded-lg shadow-md flex flex-wrap gap-4 items-center justify-between mb-4 transition-all duration-300;
            }
            .btn {
                @apply px-4 py-2 rounded-md font-medium transition-all duration-200 flex items-center gap-2;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90 active:bg-primary/80;
            }
            .btn-secondary {
                @apply bg-secondary text-white hover:bg-secondary/90 active:bg-secondary/80;
            }
            .btn-accent {
                @apply bg-accent text-white hover:bg-accent/90 active:bg-accent/80;
            }
            .btn-danger {
                @apply bg-danger text-white hover:bg-danger/90 active:bg-danger/80;
            }
            .btn-outline {
                @apply border border-gray-300 hover:bg-gray-100 active:bg-gray-200;
            }
            .slider-container {
                @apply flex items-center gap-2 w-full max-w-md;
            }
            .slider {
                @apply w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer;
            }
            .slider::-webkit-slider-thumb {
                @apply appearance-none w-5 h-5 rounded-full bg-primary cursor-pointer;
            }
            .fullscreen {
                @apply fixed inset-0 z-50 bg-black;
            }
            .lock-icon {
                @apply transition-transform duration-300;
            }
            .locked .lock-icon {
                @apply rotate-180;
            }
            .crosshair {
                @apply absolute pointer-events-none z-10;
            }
            .crosshair-horizontal {
                @apply h-[1px] w-full bg-red-200 absolute top-1/2 transform -translate-y-1/2;
            }
            .crosshair-vertical {
                @apply w-[1px] h-full bg-red-200 absolute left-1/2 transform -translate-x-1/2;
            }
            .floating-lock-btn {
                @apply fixed top-4 right-4 z-50 opacity-0 pointer-events-none transition-all duration-300;
            }
            .show-lock-btn {
                @apply opacity-100 pointer-events-auto;
            }
            .crosshair-line {
                position: fixed;
                pointer-events: none;
                z-index: 50;
                opacity: 0.5;
                transition: opacity 0.2s ease;
            }
            .crosshair-horizontal {
                height: 1px;
                width: 100%;
            }
            .crosshair-vertical {
                width: 1px;
                height: 100%;
            }

            /* 悬浮画布样式（修复无限宽）*/
            #floatCanvasWrapper {
                position: fixed;
                top: 20px;
                right: 20px;
                z-index: 9999;
                cursor: move;
                display: none;
                border: 2px solid #4F46E5;
                border-radius: 8px;
                overflow: hidden;
                background: #000;
                /* 👇 关键：强制宽高，和内部canvas一致 */
                width: 200px;
                height: 200px;
            }
            #floatCanvas {
                display: block;
                width: 200px;
                height: 200px;
            }
        }

        /* 全局彻底消除触屏白点 */
        * {
            -webkit-tap-highlight-color: transparent !important;
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            user-select: none !important;
            touch-action: manipulation !important;
            outline: none !important;
            -webkit-focus-ring-color: transparent !important;
        }
        canvas {
            outline: none !important;
            -webkit-tap-highlight-color: transparent !important;
        }
        button, label, [role="button"] {
            -webkit-tap-highlight-color: transparent !important;
            outline: none !important;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans" oncontextmenu="return false">

    <!-- 十字线 -->
    <div id="horizontal-line" class="crosshair-line crosshair-horizontal bg-red-200"></div>
    <div id="vertical-line" class="crosshair-line crosshair-vertical bg-red-200"></div>

    <!-- 悬浮画布 -->
    <div id="floatCanvasWrapper">
        <canvas id="floatCanvas"></canvas>
    </div>

    <script>
        const horizontalLine = document.getElementById('horizontal-line');
        const verticalLine = document.getElementById('vertical-line');
        let crossX = 0, crossY = 0;

        function handleMovement(e) {
            let clientX, clientY;
            if (e.type === 'mousemove') {
                clientX = e.clientX;
                clientY = e.clientY;
            } else if (e.type === 'touchmove') {
                e.preventDefault();
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }
            horizontalLine.style.top = `${clientY}px`;
            verticalLine.style.left = `${clientX}px`;
            crossX = clientX;
            crossY = clientY;
            if (window.updateFloatCanvas) window.updateFloatCanvas();
        }

        document.addEventListener('mousemove', handleMovement);
        document.addEventListener('touchmove', handleMovement, { passive: false });
    </script>

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <main>
            <div id="controlPanel" class="control-panel">
                <div class="flex flex-wrap gap-2">
                    <label for="imageUpload" class="btn btn-primary">
                        <i class="fa fa-upload"></i> 上載
                    </label>
                    <input type="file" id="imageUpload" accept="image/*" class="hidden">
                    <button id="resetBtn" class="btn btn-outline">
                        <i class="fa fa-refresh"></i> 重置
                    </button>
                    <button id="lockBtn" class="btn btn-accent locked">
                        <i class="fa fa-lock lock-icon"></i> <span>解锁</span>
                    </button>
                    <button id="toggleFloatBtn" class="btn btn-secondary">
                        <i class="fa fa-television"></i> 显示悬浮画布
                    </button>
                </div>

                <div class="flex flex-col gap-3 w-full max-w-md">
                    <div class="slider-container">
                        <button id="disSlider" class="btn btn-outline">
                            <i class="fa fa-search-minus text-gray-200"></i>
                        </button>
                        <input type="range" id="zoomSlider" min="0.1" max="20" step="0.05" value="1" class="slider">
                        <button id="inSlider" class="btn btn-outline">
                            <i class="fa fa-search-plus text-gray-200"></i>
                        </button>
                        <span id="zoomValue" class="text-sm font-medium text-gray-700 min-w-[9rem] text-center">100%</span>
                    </div>
                    <div class="slider-container">
                        <i class="fa fa-search text-primary"></i>
                        <input type="range" id="floatZoomSlider" min="0.1" max="20" step="0.05" value="3" class="slider">
                        <span id="floatZoomValue" class="text-sm font-medium text-primary min-w-[5rem] text-center">100%</span>
                    </div>
                </div>
            </div>

            <div id="canvasContainer" class="canvas-container">
                <canvas id="imageCanvas" class="absolute top-0 left-0"></canvas>
                <div id="crosshairContainer" class="hidden absolute inset-0 z-20 pointer-events-none"></div>
                <div class="absolute inset-0 flex items-center justify-center text-gray-400 text-lg" id="dropZone">
                    <div class="text-center">
                        <i class="fa fa-cloud-upload text-4mb-2"></i>
                        <p>拖放图片到这里或点击上传按钮</p>
                    </div>
                </div>
                <button id="floatingLockBtn" class="floating-lock-btn btn btn-danger">
                    <i class="fa fa-unlock lock-icon"></i> <span>解锁</span>
                </button>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const canvas = document.getElementById('imageCanvas');
            const ctx = canvas.getContext('2d');
            const canvasContainer = document.getElementById('canvasContainer');
            const zoomSlider = document.getElementById('zoomSlider');
            const zoomValue = document.getElementById('zoomValue');
            const imageUpload = document.getElementById('imageUpload');
            const resetBtn = document.getElementById('resetBtn');
            const lockBtn = document.getElementById('lockBtn');
            const floatingLockBtn = document.getElementById('floatingLockBtn');
            const dropZone = document.getElementById('dropZone');
            const crosshairContainer = document.getElementById('crosshairContainer');
            const controlPanel = document.getElementById('controlPanel');
            const toggleFloatBtn = document.getElementById('toggleFloatBtn');
            const floatCanvasWrapper = document.getElementById('floatCanvasWrapper');
            const floatCanvas = document.getElementById('floatCanvas');
            const floatZoomSlider = document.getElementById('floatZoomSlider');
            const floatZoomValue = document.getElementById('floatZoomValue');
            const inSlider = document.getElementById('inSlider');
            const disSlider = document.getElementById('disSlider');

            let image = null;
            let scale = 1;
            let offsetX = 0;
            let offsetY = 0;
            let isDragging = false;
            let lastX, lastY;
            let isLocked = false;
            let isFullscreen = false;
            let crosshairs = [];
            let isSaveCurrent = false;
            let oldscale = 1, oldoffsetX = 0, oldoffsetY = 0;

            // 悬浮画布
            floatCanvas.width = 200;
            floatCanvas.height = 200;
            const fCtx = floatCanvas.getContext('2d');
            let floatScale = 1.0;
            let isFloatVisible = false;

            // 悬浮拖动
            let isDragFloat = false;
            let floatStartX = 0, floatStartY = 0;

            floatCanvasWrapper.addEventListener('mousedown', (e) => {
                isDragFloat = true;
                const r = floatCanvasWrapper.getBoundingClientRect();
                floatStartX = e.clientX - r.left;
                floatStartY = e.clientY - r.top;
            });
            floatCanvasWrapper.addEventListener('touchstart', (e) => {
                isDragFloat = true;
                const r = floatCanvasWrapper.getBoundingClientRect();
                const t = e.touches[0];
                floatStartX = t.clientX - r.left;
                floatStartY = t.clientY - r.top;
                e.preventDefault();
            });

            function moveFloat(e) {
                if (!isDragFloat) return;
                let x, y;
                if (e.type === 'mousemove') {
                    x = e.clientX; y = e.clientY;
                } else {
                    e.preventDefault();
                    x = e.touches[0].clientX;
                    y = e.touches[0].clientY;
                }
                floatCanvasWrapper.style.left = x - floatStartX + 'px';
                floatCanvasWrapper.style.top = y - floatStartY + 'px';
            }
            document.addEventListener('mousemove', moveFloat);
            document.addEventListener('touchmove', moveFloat, { passive: false });

            function stopDragFloat() { isDragFloat = false; }
            document.addEventListener('mouseup', stopDragFloat);
            document.addEventListener('touchend', stopDragFloat);

            function updateFloatZoomValue() {
                floatZoomValue.textContent = `${Math.round(floatScale * 100)}%`;
            }
            floatZoomSlider.addEventListener('input', function () {
                floatScale = parseFloat(this.value);
                updateFloatZoomValue();
                updateFloatCanvas();
            });
            document.addEventListener('keydown', e => {
                if (e.key === '+' || e.key === '=') {
                    floatScale = Math.min(20, floatScale + 0.1);
                    floatZoomSlider.value = floatScale;
                    updateFloatZoomValue();
                    updateFloatCanvas();
                } else if (e.key === '-' || e.key === '_') {
                    floatScale = Math.max(0.1, floatScale - 0.1);
                    floatZoomSlider.value = floatScale;
                    updateFloatZoomValue();
                    updateFloatCanvas();
                }
            });

            toggleFloatBtn.addEventListener('click', () => {
                isFloatVisible = !isFloatVisible;
                floatCanvasWrapper.style.display = isFloatVisible ? 'block' : 'none';
                toggleFloatBtn.innerHTML = isFloatVisible
                    ? '<i class="fa fa-television"></i> 隐藏悬浮画布'
                    : '<i class="fa fa-television"></i> 显示悬浮画布';
                updateFloatCanvas();
            });

            window.updateFloatCanvas = function () {
                if (!image || !isFloatVisible) return;
                const fw = 200, fh = 200;
                fCtx.clearRect(0, 0, fw, fh);
                const rect = canvas.getBoundingClientRect();
                const cx = crossX - rect.left;
                const cy = crossY - rect.top;
                const imgW = image.width * scale;
                const imgH = image.height * scale;
                const imgX = (canvas.width - imgW) / 2 + offsetX;
                const imgY = (canvas.height - imgH) / 2 + offsetY;
                const cxImg = (cx - imgX) / scale;
                const cyImg = (cy - imgY) / scale;
                const fW = image.width * floatScale;
                const fH = image.height * floatScale;
                const fx = fw / 2 - cxImg * floatScale;
                const fy = fh / 2 - cyImg * floatScale;
                fCtx.drawImage(image, fx, fy, fW, fH);
                fCtx.strokeStyle = '#ef4444';
                fCtx.lineWidth = 1;
                fCtx.beginPath();
                fCtx.moveTo(fw / 2, 0);
                fCtx.lineTo(fw / 2, fh);
                fCtx.stroke();
                fCtx.beginPath();
                fCtx.moveTo(0, fh / 2);
                fCtx.lineTo(fw, fh / 2);
                fCtx.stroke();
            };

            function resizeCanvas() {
                if (isFullscreen) {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                } else {
                    canvas.width = canvasContainer.clientWidth;
                    canvas.height = canvasContainer.clientHeight;
                }
                drawImage();
                renderCrosshairs();
                updateFloatCanvas();
            }

            function loadImage(img) {
                isSaveCurrent = false;
                image = img;
                resizeCanvas();
                resetView();
                dropZone.classList.add('hidden');
                canvas.classList.remove('hidden');
                updateFloatCanvas();
            }

            function drawImage() {
                if (!image) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const w = image.width * scale;
                const h = image.height * scale;
                const x = (canvas.width - w) / 2 + offsetX;
                const y = (canvas.height - h) / 2 + offsetY;
                ctx.drawImage(image, x, y, w, h);
            }

            function cScale() {
                scale = 1;
                while (image.width * scale > canvas.width && scale > 0.01) scale -= 0.05;
                while (image.height * scale > canvas.height && scale > 0.01) scale -= 0.05;
            }

            function resetView() {
                cScale();
                offsetX = offsetY = 0;
                zoomSlider.value = scale;
                updateZoomValue();
                drawImage();
                clearCrosshairs();
                updateFloatCanvas();
            }

            function updateZoomValue() {
                zoomValue.textContent = `${Math.round(scale * 100)}%`;
            }

            imageUpload.addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (!file) return;
                const r = new FileReader();
                r.onload = ev => {
                    const img = new Image();
                    img.onload = () => loadImage(img);
                    img.src = ev.target.result;
                };
                r.readAsDataURL(file);
            });

            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(n => {
                canvasContainer.addEventListener(n, e => { e.preventDefault(); e.stopPropagation(); }, false);
            });
            canvasContainer.addEventListener('drop', e => {
                const file = e.dataTransfer.files[0];
                if (!file || !file.type.startsWith('image/')) return;
                const r = new FileReader();
                r.onload = ev => {
                    const img = new Image();
                    img.onload = () => loadImage(img);
                    img.src = ev.target.result;
                };
                r.readAsDataURL(file);
            });

            zoomSlider.addEventListener('input', function () {
                if (isLocked) return;
                scale = parseFloat(this.value);
                updateZoomValue();
                drawImage();
                updateFloatCanvas();
            });

            resetBtn.addEventListener('click', function () {
                if (isLocked) return;
                if (!isSaveCurrent) {
                    saveOlderValue();
                    resetView();
                    isSaveCurrent = true;
                } else {
                    isSaveCurrent = false;
                    displayOldValue();
                }
            });

            function saveOlderValue() {
                oldscale = scale;
                oldoffsetX = offsetX;
                oldoffsetY = offsetY;
            }
            function displayOldValue() {
                scale = oldscale;
                offsetX = oldoffsetX;
                offsetY = oldoffsetY;
                zoomSlider.value = scale;
                updateZoomValue();
                drawImage();
                clearCrosshairs();
                updateFloatCanvas();
            }

            disSlider.addEventListener('click', () => {
                if (scale <= 0.2) return;
                scale -= 0.1;
                zoomSlider.value = scale;
                updateZoomValue();
                drawImage();
                updateFloatCanvas();
            });
            inSlider.addEventListener('click', () => {
                scale += 0.1;
                zoomSlider.value = scale;
                updateZoomValue();
                drawImage();
                updateFloatCanvas();
            });

            function toggleLockMode() {
                isLocked = !isLocked;
                if (isLocked) {
                    lockBtn.innerHTML = '<i class="fa fa-unlock lock-icon"></i> <span>解锁</span>';
                    lockBtn.classList.remove('btn-accent');
                    lockBtn.classList.add('btn-danger');
                    floatingLockBtn.innerHTML = '<i class="fa fa-unlock lock-icon"></i> <span>解锁</span>';
                    floatingLockBtn.classList.add('btn-danger');
                    const s = scale, x = offsetX, y = offsetY;
                    isFullscreen = true;
                    resetView();
                    scale = s; offsetX = x; offsetY = y;
                    zoomSlider.value = scale;
                    updateZoomValue();
                    drawImage();
                    controlPanel.classList.add('opacity-0', 'pointer-events-none');
                    floatingLockBtn.classList.add('show-lock-btn');
                    crosshairContainer.classList.remove('hidden');
                    document.body.classList.add('overflow-hidden');
                } else {
                    lockBtn.innerHTML = '<i class="fa fa-lock lock-icon"></i> <span>锁定</span>';
                    lockBtn.classList.remove('btn-danger');
                    lockBtn.classList.add('btn-accent');
                    floatingLockBtn.classList.remove('btn-danger');
                    floatingLockBtn.classList.add('btn-accent');
                    isFullscreen = false;
                    resizeCanvas();
                    controlPanel.classList.remove('opacity-0', 'pointer-events-none');
                    floatingLockBtn.classList.remove('show-lock-btn');
                    crosshairContainer.classList.add('hidden');
                    clearCrosshairs();
                    document.body.classList.remove('overflow-hidden');
                }
            }

            lockBtn.addEventListener('click', toggleLockMode);
            floatingLockBtn.addEventListener('click', toggleLockMode);

            function addCrosshair(x, y) {
                const ch = document.createElement('div');
                ch.className = 'crosshair';
                ch.style.left = x + 'px';
                ch.style.top = y + 'px';
                const h = document.createElement('div');
                h.className = 'crosshair-horizontal';
                const v = document.createElement('div');
                v.className = 'crosshair-vertical';
                ch.appendChild(h);
                ch.appendChild(v);
                crosshairContainer.appendChild(ch);
                crosshairs.push({ element: ch, x, y });
            }
            function clearCrosshairs() {
                crosshairs.forEach(c => c.element.remove());
                crosshairs = [];
            }
            function renderCrosshairs() {
                crosshairContainer.innerHTML = '';
                crosshairs.forEach(c => {
                    const ch = document.createElement('div');
                    ch.className = 'crosshair';
                    ch.style.left = c.x + 'px';
                    ch.style.top = c.y + 'px';
                    const h = document.createElement('div');
                    h.className = 'crosshair-horizontal';
                    const v = document.createElement('div');
                    v.className = 'crosshair-vertical';
                    ch.appendChild(h);
                    ch.appendChild(v);
                    crosshairContainer.appendChild(ch);
                    c.element = ch;
                });
            }

            canvas.addEventListener('mousedown', e => {
                if (isLocked) {
                    const r = canvas.getBoundingClientRect();
                    addCrosshair(e.clientX - r.left, e.clientY - r.top);
                } else {
                    isDragging = true;
                    lastX = e.clientX - offsetX;
                    lastY = e.clientY - offsetY;
                }
            });
            canvas.addEventListener('mousemove', e => {
                if (!isDragging || isLocked) return;
                offsetX = e.clientX - lastX;
                offsetY = e.clientY - lastY;
                drawImage();
                updateFloatCanvas();
            });
            canvas.addEventListener('mouseup', () => isDragging = false);
            canvas.addEventListener('mouseleave', () => isDragging = false);

            canvas.addEventListener('touchstart', e => {
                e.preventDefault();
                if (isLocked) {
                    const r = canvas.getBoundingClientRect();
                    const t = e.touches[0];
                    addCrosshair(t.clientX - r.left, t.clientY - r.top);
                } else {
                    isDragging = true;
                    lastX = e.touches[0].clientX - offsetX;
                    lastY = e.touches[0].clientY - offsetY;
                }
            });
            canvas.addEventListener('touchmove', e => {
                e.preventDefault();
                if (!isDragging || isLocked) return;
                offsetX = e.touches[0].clientX - lastX;
                offsetY = e.touches[0].clientY - lastY;
                drawImage();
                updateFloatCanvas();
            });
            canvas.addEventListener('touchend', () => isDragging = false);

            canvas.addEventListener('wheel', e => {
                if (isLocked) return;
                e.preventDefault();
                const r = canvas.getBoundingClientRect();
                const mx = e.clientX - r.left;
                const my = e.clientY - r.top;
                const iw = image.width * scale;
                const ih = image.height * scale;
                const ix = (canvas.width - iw) / 2 + offsetX;
                const iy = (canvas.height - ih) / 2 + offsetY;
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                const ns = Math.max(0.1, Math.min(20, scale + delta));
                const niw = image.width * ns;
                const nih = image.height * ns;
                const nix = (canvas.width - niw) / 2 + offsetX;
                const niy = (canvas.height - nih) / 2 + offsetY;
                offsetX += (mx - nix) - (mx - ix) * (ns / scale);
                offsetY += (my - niy) - (my - iy) * (ns / scale);
                scale = ns;
                zoomSlider.value = scale;
                updateZoomValue();
                drawImage();
                updateFloatCanvas();
            });

            window.addEventListener('resize', resizeCanvas);
            updateFloatZoomValue();
            resizeCanvas();
        });
    </script>
</body>
</html>
