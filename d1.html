<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>圖片 Canvas 編輯器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#10B981',
                        accent: '#F59E0B',
                        danger: '#EF4444',
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .canvas-container {
                @apply relative w-full h-[75vh] bg-gray-100 rounded-lg overflow-hidden shadow-lg border border-gray-200;
            }
            .control-panel {
                @apply bg-white p-4 rounded-lg shadow-md flex flex-wrap gap-4 items-center justify-between mb-4;
            }
            .btn {
                @apply px-4 py-2 rounded-md font-medium transition-all duration-200 flex items-center gap-2;
            }
            .btn-primary { @apply bg-primary text-white hover:bg-primary/90; }
            .btn-secondary { @apply bg-secondary text-white hover:bg-secondary/90; }
            .btn-accent { @apply bg-accent text-white hover:bg-accent/90; }
            .btn-danger { @apply bg-danger text-white hover:bg-danger/90; }
            .btn-outline { @apply border border-gray-300 hover:bg-gray-100; }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans" oncontextmenu="return false;">

    <!-- 全局禁止右鍵 -->
    <script>
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <main>
            <div id="controlPanel" class="control-panel">
                <div class="flex flex-wrap gap-2">
                    <label for="imageUpload" class="btn btn-primary cursor-pointer">
                        <i class="fa fa-upload"></i> 上傳圖片
                    </label>
                    <input type="file" id="imageUpload" accept="image/*" class="hidden">

                    <button id="resetBtn" class="btn btn-outline">
                        <i class="fa fa-refresh"></i> 重置
                    </button>

                    <button id="oilBtn" class="btn btn-secondary">
                        <i class="fa fa-paint-brush"></i> 油畫效果
                    </button>

                    <button id="sketchBtn" class="btn btn-secondary">
                        <i class="fa fa-pencil"></i> 線條效果
                    </button>

                    <button id="lockBtn" class="btn btn-accent">
                        <i class="fa fa-lock"></i> <span>鎖定</span>
                    </button>
                </div>

                <div class="flex items-center gap-4">
                    <div class="slider-container flex items-center gap-2">
                        <button id="disSlider" class="btn btn-outline">
                            <i class="fa fa-search-minus"></i>
                        </button>
                        <input type="range" id="zoomSlider" min="0.1" max="20" step="0.05" value="1" class="slider w-48">
                        <button id="inSlider" class="btn btn-outline">
                            <i class="fa fa-search-plus"></i>
                        </button>
                        <span id="zoomValue" class="text-sm font-medium text-gray-700 min-w-[5rem]">100%</span>
                    </div>
                </div>
            </div>

            <div id="canvasContainer" class="canvas-container">
                <canvas id="imageCanvas"></canvas>
                <div id="dropZone" class="absolute inset-0 flex items-center justify-center text-gray-400 text-lg">
                    <div class="text-center">
                        <i class="fa fa-cloud-upload text-4xl mb-2"></i>
                        <p>拖放圖片到這裡或點擊上傳</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById('imageCanvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            const canvasContainer = document.getElementById('canvasContainer');
            const zoomSlider = document.getElementById('zoomSlider');
            const zoomValue = document.getElementById('zoomValue');
            const imageUpload = document.getElementById('imageUpload');
            const resetBtn = document.getElementById('resetBtn');
            const lockBtn = document.getElementById('lockBtn');
            const oilBtn = document.getElementById('oilBtn');
            const sketchBtn = document.getElementById('sketchBtn');
            const dropZone = document.getElementById('dropZone');

            let image = null;
            let scale = 1;
            let offsetX = 0;
            let offsetY = 0;
            let isDragging = false;
            let lastX = 0, lastY = 0;
            let isLocked = false;
            let currentFilter = 'none'; // 'none', 'oil', 'sketch'

            // 初始化畫布
            function resizeCanvas() {
                canvas.width = canvasContainer.clientWidth;
                canvas.height = canvasContainer.clientHeight;
                drawImage();
            }

            // 載入圖片
            function loadImage(img) {
                image = img;
                currentFilter = 'none';
                resetView();
                dropZone.classList.add('hidden');
            }

            // 繪製圖片（支援濾鏡）
            function drawImage() {
                if (!image) return;

                ctx.clearRect(0, 0, canvas.width, canvas.height);

                const imgWidth = image.width * scale;
                const imgHeight = image.height * scale;
                const drawX = (canvas.width - imgWidth) / 2 + offsetX;
                const drawY = (canvas.height - imgHeight) / 2 + offsetY;

                // 先正常繪製圖片
                ctx.drawImage(image, drawX, drawY, imgWidth, imgHeight);

                // 如果有套用濾鏡，再處理
                if (currentFilter !== 'none') {
                    applyFilterToCanvas(currentFilter);
                }
            }

            // 套用濾鏡到 Canvas
            function applyFilterToCanvas(filterType) {
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                if (filterType === 'oil') {
                    // 簡單油畫效果（顏色平均 + 輕微噪點）
                    for (let i = 0; i < data.length; i += 4) {
                        const avg = (data[i] + data[i+1] + data[i+2]) / 3;
                        data[i] = data[i+1] = data[i+2] = Math.floor(avg * 0.95 + 20); // 輕微暖色調
                    }
                } 
                else if (filterType === 'sketch') {
                    // 簡單線條 / 素描效果（邊緣增強 + 灰階）
                    for (let i = 0; i < data.length; i += 4) {
                        const gray = 0.299 * data[i] + 0.587 * data[i+1] + 0.114 * data[i+2];
                        data[i] = data[i+1] = data[i+2] = gray < 128 ? 30 : 255; // 高對比黑白線條
                    }
                }

                ctx.putImageData(imageData, 0, 0);
            }

            // 重置視圖
            function resetView() {
                scale = 1;
                offsetX = 0;
                offsetY = 0;
                zoomSlider.value = 1;
                updateZoomValue();
                drawImage();
            }

            function updateZoomValue() {
                zoomValue.textContent = `${Math.round(scale * 100)}%`;
            }

            // === 油畫效果 ===
            oilBtn.addEventListener('click', () => {
                if (!image) return;
                currentFilter = currentFilter === 'oil' ? 'none' : 'oil';
                drawImage();
            });

            // === 線條效果 ===
            sketchBtn.addEventListener('click', () => {
                if (!image) return;
                currentFilter = currentFilter === 'sketch' ? 'none' : 'sketch';
                drawImage();
            });

            // 上傳圖片
            imageUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const img = new Image();
                    img.onload = () => loadImage(img);
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
            });

            // 拖放
            canvasContainer.addEventListener('drop', (e) => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const img = new Image();
                        img.onload = () => loadImage(img);
                        img.src = ev.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });

            // 防止預設拖放行為
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => {
                canvasContainer.addEventListener(ev, e => {
                    e.preventDefault();
                    e.stopPropagation();
                });
            });

            // 縮放控制
            zoomSlider.addEventListener('input', () => {
                if (isLocked) return;
                scale = parseFloat(zoomSlider.value);
                updateZoomValue();
                drawImage();
            });

            // 放大 / 縮小按鈕
            document.getElementById('inSlider').addEventListener('click', () => {
                if (isLocked) return;
                scale = Math.min(20, scale + 0.1);
                zoomSlider.value = scale;
                updateZoomValue();
                drawImage();
            });

            document.getElementById('disSlider').addEventListener('click', () => {
                if (isLocked) return;
                scale = Math.max(0.1, scale - 0.1);
                zoomSlider.value = scale;
                updateZoomValue();
                drawImage();
            });

            // 重置按鈕
            resetBtn.addEventListener('click', () => {
                if (isLocked) return;
                currentFilter = 'none';
                resetView();
            });

            // 鎖定模式（保留原本功能）
            lockBtn.addEventListener('click', () => {
                isLocked = !isLocked;
                if (isLocked) {
                    lockBtn.classList.remove('btn-accent');
                    lockBtn.classList.add('btn-danger');
                    lockBtn.innerHTML = '<i class="fa fa-unlock"></i> <span>解鎖</span>';
                } else {
                    lockBtn.classList.remove('btn-danger');
                    lockBtn.classList.add('btn-accent');
                    lockBtn.innerHTML = '<i class="fa fa-lock"></i> <span>鎖定</span>';
                }
            });

            // 滑鼠拖動
            canvas.addEventListener('mousedown', (e) => {
                if (isLocked) return;
                isDragging = true;
                lastX = e.clientX - offsetX;
                lastY = e.clientY - offsetY;
            });

            canvas.addEventListener('mousemove', (e) => {
                if (!isDragging || isLocked) return;
                offsetX = e.clientX - lastX;
                offsetY = e.clientY - lastY;
                drawImage();
            });

            window.addEventListener('mouseup', () => isDragging = false);

            // 滾輪縮放
            canvas.addEventListener('wheel', (e) => {
                if (isLocked) return;
                e.preventDefault();
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                scale = Math.max(0.1, Math.min(20, scale + delta));
                zoomSlider.value = scale;
                updateZoomValue();
                drawImage();
            });

            // 視窗調整
            window.addEventListener('resize', resizeCanvas);

            // 初始化
            resizeCanvas();
        });
    </script>
</body>
</html>
