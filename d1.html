<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片Canvas编辑器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#10B981',
                        accent: '#F59E0B',
                        danger: '#EF4444',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .canvas-container {
                @apply relative w-full h-[75vh] bg-gray-100 rounded-lg overflow-hidden shadow-lg border border-gray-200;
            }
            .control-panel {
                @apply bg-white p-4 rounded-lg shadow-md flex flex-wrap gap-4 items-center justify-between mb-4 transition-all duration-300;
            }
            .btn {
                @apply px-4 py-2 rounded-md font-medium transition-all duration-200 flex items-center gap-2;
            }
            .btn-primary {
                @apply bg-primary text-white hover:bg-primary/90 active:bg-primary/80;
            }
            .btn-secondary {
                @apply bg-secondary text-white hover:bg-secondary/90 active:bg-secondary/80;
            }
            .btn-accent {
                @apply bg-accent text-white hover:bg-accent/90 active:bg-accent/80;
            }
            .btn-danger {
                @apply bg-danger text-white hover:bg-danger/90 active:bg-danger/80;
            }
            .btn-outline {
                @apply border border-gray-300 hover:bg-gray-100 active:bg-gray-200;
            }
            .slider-container {
                @apply flex items-center gap-2 w-full max-w-md;
            }
            .slider {
                @apply w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer;
            }
            .slider::-webkit-slider-thumb {
                @apply appearance-none w-5 h-5 rounded-full bg-primary cursor-pointer;
            }
            .fullscreen {
                @apply fixed inset-0 z-50 bg-black;
            }
            .lock-icon {
                @apply transition-transform duration-300;
            }
            .locked .lock-icon {
                @apply rotate-180;
            }
            .crosshair {
                @apply absolute pointer-events-none z-10;
            }
            .crosshair-horizontal {
                @apply h-[1px] w-full bg-red-200 absolute top-1/2 transform -translate-y-1/2;
            }
            .crosshair-vertical {
                @apply w-[1px] h-full bg-red-200 absolute left-1/2 transform -translate-x-1/2;
            }
            .floating-lock-btn {
                @apply fixed top-4 right-4 z-50 opacity-0 pointer-events-none transition-all duration-300;
            }
            .show-lock-btn {
                @apply opacity-100 pointer-events-auto;
            }
			
			  .content-auto {
                content-visibility: auto;
            }
            .crosshair-line {
                position: fixed;
                pointer-events: none;
                z-index: 50;
                opacity: 0.5;
                transition: opacity 0.2s ease;
            }
            .crosshair-horizontal {
                height: 1px;
                width: 100%;
            }
            .crosshair-vertical {
                width: 1px;
                height: 100%;
            }
            .fade-out {
                opacity: 0;
            }
			
			/* 新增：悬浮200x200画布 */
			#floatCanvasWrapper {
				position: fixed;
				top: 50px;
				left: 50px;
				width: 200px;
				height: 200px;
				z-index: 9999;
				border: 2px solid #4F46E5;
				background: #000;
				cursor: move;
				display: none;
			}
			#floatCanvas {
				width: 100%;
				height: 100%;
			}
        }
    </style>
</head>
<body class="bg-gray-50 font-sans"  oncontextmenu="return false">

    <!-- 十字线元素 -->
    <div id="horizontal-line" class="crosshair-line crosshair-horizontal bg-red-200"></div>
    <div id="vertical-line" class="crosshair-line crosshair-vertical bg-red-200"></div>

    <!-- 新增：悬浮200x200画布 -->
    <div id="floatCanvasWrapper">
        <canvas id="floatCanvas"></canvas>
    </div>

    <script>
        // ==============================
        // 你原来的十字功能 100% 完全不变
        // 鼠标/触屏 控制十字
        // ==============================
        const horizontalLine = document.getElementById('horizontal-line');
        const verticalLine = document.getElementById('vertical-line');
        let fadeTimer;

        let crossX = 0, crossY = 0; // 十字坐标

        function handleMovement(e) {
            let clientX, clientY;
            if (e.type === 'mousemove') {
                clientX = e.clientX;
                clientY = e.clientY;
            } else if (e.type === 'touchmove') {
                e.preventDefault();
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }

            horizontalLine.style.top = `${clientY}px`;
            verticalLine.style.left = `${clientX}px`;

            crossX = clientX;
            crossY = clientY;

            // 更新悬浮画布
            if (window.updateFloatCanvas) {
                window.updateFloatCanvas();
            }
        }

        document.addEventListener('mousemove', handleMovement);
        document.addEventListener('touchmove', handleMovement, { passive: false });
    </script>

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <main>
            <div id="controlPanel" class="control-panel">
                <div class="flex flex-wrap gap-2">
                    <label for="imageUpload" class="btn btn-primary">
                        <i class="fa fa-upload"></i> 上传
                    </label>
                    <input type="file" id="imageUpload" accept="image/*" class="hidden">
                    
             
                    
                    <button id="lockBtn" class="btn btn-accent locked">
                        <i class="fa fa-lock lock-icon"></i> <span>解锁</span>
                    </button>
					
					<!-- 新增：开关悬浮画布 -->
					<button id="toggleFloatBtn" class="btn btn-secondary">
						<i class="fa fa-television"></i> 显示悬浮画布
					</button>
                </div>
                
                <div class="flex flex-col gap-3 w-full max-w-md">
                    <div class="slider-container">
                        <button id="disSlider" class="btn btn-outline">
                            <i class="fa fa-search-minus text-gray-200"></i>
                        </button>
                        <input type="range" id="zoomSlider" min="0.1" max="20" step="0.05" value="1" class="slider">
                        <button id="inSlider" class="btn btn-outline">
                            <i class="fa fa-search-plus text-gray-200"></i>
                        </button>
                        <span id="zoomValue" class="text-sm font-medium text-gray-700 min-w-[9rem] text-center">100%</span>
                    </div>
                    
                    <!-- 悬浮画布缩放滑块 -->
                    <div class="slider-container">
                        <i class="fa fa-search text-primary"></i>
                        <input type="range" id="floatZoomSlider" min="0.1" max="20" step="0.05" value="1" class="slider">
                        <span id="floatZoomValue" class="text-sm font-medium text-primary min-w-[5rem] text-center">100%</span>
                    </div>
                </div>
            </div>

            <div id="canvasContainer" class="canvas-container">
                <canvas id="imageCanvas" class="absolute top-0 left-0"></canvas>
                <div id="crosshairContainer" class="hidden absolute inset-0 z-20 pointer-events-none"></div>
                <div class="absolute inset-0 flex items-center justify-center text-gray-400 text-lg" id="dropZone">
                    <div class="text-center">
                        <i class="fa fa-cloud-upload text-4mb-2"></i>
                        <p>拖放图片到这里或点击上传按钮</p>
                    </div>
                </div>
                
                <button id="floatingLockBtn" class="floating-lock-btn btn btn-danger">
                    <i class="fa fa-unlock lock-icon"></i> <span>解锁</span>
                </button>
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById('imageCanvas');
            const ctx = canvas.getContext('2d');
            const canvasContainer = document.getElementById('canvasContainer');
            const zoomSlider = document.getElementById('zoomSlider');
            const zoomValue = document.getElementById('zoomValue');
            const imageUpload = document.getElementById('imageUpload');
            const resetBtn = document.getElementById('resetBtn');
            const lockBtn = document.getElementById('lockBtn');
            const floatingLockBtn = document.getElementById('floatingLockBtn');
            const dropZone = document.getElementById('dropZone');
            const crosshairContainer = document.getElementById('crosshairContainer');
            const controlPanel = document.getElementById('controlPanel');
			const toggleFloatBtn = document.getElementById('toggleFloatBtn');
			const floatCanvasWrapper = document.getElementById('floatCanvasWrapper');
			const floatCanvas = document.getElementById('floatCanvas');
			const floatZoomSlider = document.getElementById('floatZoomSlider');
			const floatZoomValue = document.getElementById('floatZoomValue');
			
			const inSlider = document.getElementById('inSlider');
			const disSlider = document.getElementById('disSlider');
			
            let image = null;
            let scale = 1;
            let offsetX = 0;
            let offsetY = 0;
            let isDragging = false;
            let lastX, lastY;
            let isLocked = false;
            let isFullscreen = false;
            let crosshairs = [];
			let isSaveCurrent = false;
		    let oldscale = 1;
            let oldoffsetX = 0;
            let oldoffsetY = 0;	

            // ========================
            // 新增：悬浮画布功能
            // ========================
            floatCanvas.width = 200;
            floatCanvas.height = 200;
            const fCtx = floatCanvas.getContext('2d');
            let floatScale = 1.0;
            let isFloatVisible = false;

            // 拖动悬浮窗口（支持鼠标 + 触屏）
            let isDragFloat = false;
            let floatStartX, floatStartY;

            // 鼠标开始拖动
            floatCanvasWrapper.addEventListener('mousedown', e => {
                isDragFloat = true;
                const rect = floatCanvasWrapper.getBoundingClientRect();
                floatStartX = e.clientX - rect.left;
                floatStartY = e.clientY - rect.top;
            });

            // 触屏开始拖动
            floatCanvasWrapper.addEventListener('touchstart', e => {
                isDragFloat = true;
                const rect = floatCanvasWrapper.getBoundingClientRect();
                const touch = e.touches[0];
                floatStartX = touch.clientX - rect.left;
                floatStartY = touch.clientY - rect.top;
                e.preventDefault();
            });

            // 鼠标/触屏 移动中
            function handleFloatMove(e) {
                if (!isDragFloat) return;
                let clientX, clientY;
                if (e.type === 'mousemove') {
                    clientX = e.clientX;
                    clientY = e.clientY;
                } else if (e.type === 'touchmove') {
                    e.preventDefault();
                    clientX = e.touches[0].clientX;
                    clientY = e.touches[0].clientY;
                }
                floatCanvasWrapper.style.left = (clientX - floatStartX) + 'px';
                floatCanvasWrapper.style.top = (clientY - floatStartY) + 'px';
            }

            document.addEventListener('mousemove', handleFloatMove);
            document.addEventListener('touchmove', handleFloatMove, { passive: false });

            // 鼠标/触屏 结束拖动
            function stopFloatDrag() {
                isDragFloat = false;
            }

            document.addEventListener('mouseup', stopFloatDrag);
            document.addEventListener('touchend', stopFloatDrag);

            // 更新悬浮画布缩放显示
            function updateFloatZoomValue() {
                floatZoomValue.textContent = `${Math.round(floatScale * 100)}%`;
            }

            // 悬浮画布滑块控制
            floatZoomSlider.addEventListener('input', function() {
                floatScale = parseFloat(this.value);
                updateFloatZoomValue();
                updateFloatCanvas();
            });

            // + - 键 + 滑块 同步控制悬浮画布缩放
            document.addEventListener('keydown', e => {
                if (e.key === '+' || e.key === '=') {
                    floatScale += 0.1;
                    floatZoomSlider.value = floatScale;
                    updateFloatZoomValue();
                    updateFloatCanvas();
                } else if (e.key === '-' || e.key === '_') {
                    floatScale = Math.max(0.1, floatScale - 0.1);
                    floatZoomSlider.value = floatScale;
                    updateFloatZoomValue();
                    updateFloatCanvas();
                }
            });

            // 开关显示/隐藏
            toggleFloatBtn.addEventListener('click', () => {
                isFloatVisible = !isFloatVisible;
                floatCanvasWrapper.style.display = isFloatVisible ? 'block' : 'none';
                toggleFloatBtn.innerHTML = isFloatVisible 
                    ? '<i class="fa fa-television"></i> 隐藏悬浮画布' 
                    : '<i class="fa fa-television"></i> 显示悬浮画布';
                updateFloatCanvas();
            });

            // 绘制悬浮画布：以红色十字为中心
            window.updateFloatCanvas = function() {
                if (!image || !isFloatVisible) return;

                const fw = 200;
                const fh = 200;
                fCtx.clearRect(0, 0, fw, fh);

                const rect = canvas.getBoundingClientRect();
                const cx = crossX - rect.left;
                const cy = crossY - rect.top;

                const imgW = image.width * scale;
                const imgH = image.height * scale;
                const imgX = (canvas.width - imgW) / 2 + offsetX;
                const imgY = (canvas.height - imgH) / 2 + offsetY;

                const centerImgX = (cx - imgX) / scale;
                const centerImgY = (cy - imgY) / scale;

                const fSizeW = image.width * floatScale;
                const fSizeH = image.height * floatScale;

                const drawFX = fw/2 - centerImgX * floatScale;
                const drawFY = fh/2 - centerImgY * floatScale;

                fCtx.drawImage(image, drawFX, drawFY, fSizeW, fSizeH);

                // 中心十字
                fCtx.strokeStyle = '#ef4444';
                fCtx.lineWidth = 1;
                fCtx.beginPath();
                fCtx.moveTo(fw/2, 0);
                fCtx.lineTo(fw/2, fh);
                fCtx.stroke();
                fCtx.beginPath();
                fCtx.moveTo(0, fh/2);
                fCtx.lineTo(fw, fh/2);
                fCtx.stroke();
            }

            function resizeCanvas() {
                if (isFullscreen) {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                } else {
                    canvas.width = canvasContainer.clientWidth;
                    canvas.height = canvasContainer.clientHeight;
                }
                drawImage();
                renderCrosshairs();
                updateFloatCanvas();
            }
            
            function loadImage(img) {
                isSaveCurrent = false;
                image = img;
                resetView();
                dropZone.classList.add('hidden');
                canvas.classList.remove('hidden');
                updateFloatCanvas();
            }
            
            function drawImage() {
                if (!image) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const imgWidth = image.width * scale;
                const imgHeight = image.height * scale;
                const drawX = (canvas.width - imgWidth) / 2 + offsetX;
                const drawY = (canvas.height - imgHeight) / 2 + offsetY;
                ctx.drawImage(image, drawX, drawY, imgWidth, imgHeight);
            }
			
			function cScale(){
			scale = 1;
			  while (image.width * scale > canvas.width && scale > 0.01) {
                scale -= 0.05;
                 }
			 while (image.height * scale > canvas.height && scale > 0.01) {
                scale -= 0.05;
                 }
			}
            
            function resetView() {
                cScale();
                offsetX = 0;
                offsetY = 0;
                zoomSlider.value = scale;
                updateZoomValue();
                drawImage();
                clearCrosshairs();
                updateFloatCanvas();
            }
            
            function updateZoomValue() {
                zoomValue.textContent = `${Math.round(scale * 100)}%`;
            }
            
            imageUpload.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() { loadImage(img); };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
            
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
                canvasContainer.addEventListener(eventName, preventDefaults, false);
            });
            function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }
            canvasContainer.addEventListener('drop', handleDrop, false);
            function handleDrop(e) {
                const dt = e.dataTransfer;
                const file = dt.files[0];
                if (!file || !file.type.match('image.*')) return;
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() { loadImage(img); };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
            
            zoomSlider.addEventListener('input', function() {
                if (isLocked) return;
                scale = parseFloat(this.value);
                updateZoomValue();
                drawImage();
                updateFloatCanvas();
            });
            
            resetBtn.addEventListener('click', function() {
                if (isLocked) return;
                if (!isSaveCurrent) {
                    saveOlderValue();
                    resetView();
                    isSaveCurrent=true;
                }else{
                    isSaveCurrent=false;
                    displayOldValue();
                }
            });
			
			function saveOlderValue(){
				oldscale = scale;
				oldoffsetX = offsetX;
				oldoffsetY = offsetY;	
			}
			function displayOldValue(){
				scale = oldscale;
				offsetX = oldoffsetX;
				offsetY = oldoffsetY;
				zoomSlider.value = scale;
                updateZoomValue();
				drawImage();
				clearCrosshairs();
				updateFloatCanvas();
			}
			
			disSlider.addEventListener('click', function() {
			 if (scale<=0.2) return;
                  scale -= 0.1;		
                zoomSlider.value = scale;
                updateZoomValue();
                drawImage();
                updateFloatCanvas();
            });
			inSlider.addEventListener('click', function() {
                scale += 0.1;		
                zoomSlider.value = scale;
                updateZoomValue();
                drawImage();
                updateFloatCanvas();
            });
            
            function toggleLockMode() {
                isLocked = !isLocked;

                if (isLocked) {
                    lockBtn.innerHTML = '<i class="fa fa-unlock lock-icon"></i> <span>解锁</span>';
                    lockBtn.classList.remove('btn-accent');
                    lockBtn.classList.add('btn-danger');
                    floatingLockBtn.innerHTML = '<i class="fa fa-unlock lock-icon"></i> <span>解锁</span>';
                    floatingLockBtn.classList.add('btn-danger');
                    
                    const tempScale = scale;
                    const tempOffsetX = offsetX;
                    const tempOffsetY = offsetY;
                    
                    isFullscreen = true;
                    resetView();
                    
                    scale = tempScale;
                    offsetX = tempOffsetX;
                    offsetY = tempOffsetY;
                    zoomSlider.value = scale;
                    updateZoomValue();
                    drawImage();
                    
                    controlPanel.classList.add('opacity-0', 'pointer-events-none');
                    floatingLockBtn.classList.add('show-lock-btn');
                    crosshairContainer.classList.remove('hidden');
                    document.body.classList.add('overflow-hidden');
                } else {
                    lockBtn.innerHTML = '<i class="fa fa-lock lock-icon"></i> <span>锁定</span>';
                    lockBtn.classList.remove('btn-danger');
                    lockBtn.classList.add('btn-accent');
                    floatingLockBtn.classList.remove('btn-danger');
                    floatingLockBtn.classList.add('btn-accent');
                    
                    isFullscreen = false;
                    resizeCanvas();
                    controlPanel.classList.remove('opacity-0', 'pointer-events-none');
                    floatingLockBtn.classList.remove('show-lock-btn');
                    crosshairContainer.classList.add('hidden');
                    clearCrosshairs();
                    document.body.classList.remove('overflow-hidden');
                }
            }
            
            lockBtn.addEventListener('click', toggleLockMode);
            floatingLockBtn.addEventListener('click', toggleLockMode);
            
            function exitHandler() {
                if (!document.fullscreenElement) {
                    if (isLocked) {
                        isLocked = false;
                        lockBtn.innerHTML = '<i class="fa fa-lock lock-icon"></i> <span>锁定</span>';
                        lockBtn.classList.remove('btn-danger');
                        lockBtn.classList.add('btn-accent');
                        floatingLockBtn.innerHTML = '<i class="fa fa-lock lock-icon"></i> <span>锁定</span>';
                        isFullscreen = false;
                        resizeCanvas();
                        controlPanel.classList.remove('opacity-0', 'pointer-events-none');
                        floatingLockBtn.classList.remove('show-lock-btn');
                        crosshairContainer.classList.add('hidden');
                        clearCrosshairs();
                        document.body.classList.remove('overflow-hidden');
                    }
                }
            }
            
            function addCrosshair(x, y) {
                const crosshair = document.createElement('div');
                crosshair.className = 'crosshair';
                crosshair.style.left = `${x}px`;
                crosshair.style.top = `${y}px`;
                const horizontalLine = document.createElement('div');
                horizontalLine.className = 'crosshair-horizontal';
                const verticalLine = document.createElement('div');
                verticalLine.className = 'crosshair-vertical';
                crosshair.appendChild(horizontalLine);
                crosshair.appendChild(verticalLine);
                crosshairContainer.appendChild(crosshair);
                crosshairs.push({ element: crosshair, x: x, y: y });
            }
            
            function clearCrosshairs() {
                crosshairs.forEach(ch => ch.element.remove());
                crosshairs = [];
            }
            
            function renderCrosshairs() {
                crosshairContainer.innerHTML = '';
                crosshairs.forEach(ch => {
                    const crosshair = document.createElement('div');
                    crosshair.className = 'crosshair';
                    crosshair.style.left = `${ch.x}px`;
                    crosshair.style.top = `${ch.y}px`;
                    const h = document.createElement('div');
                    h.className = 'crosshair-horizontal';
                    const v = document.createElement('div');
                    v.className = 'crosshair-vertical';
                    crosshair.appendChild(h);
                    crosshair.appendChild(v);
                    crosshairContainer.appendChild(crosshair);
                    ch.element = crosshair;
                });
            }
            
            canvas.addEventListener('mousedown', function(e) {
                if (isLocked) {
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    addCrosshair(x, y);
                } else {
                    isDragging = true;
                    lastX = e.clientX - offsetX;
                    lastY = e.clientY - offsetY;
                }
            });
            
            canvas.addEventListener('mousemove', function(e) {
                if (!isDragging || isLocked) return;
                offsetX = e.clientX - lastX;
                offsetY = e.clientY - lastY;
                drawImage();
                updateFloatCanvas();
            });
            
            canvas.addEventListener('mouseup', function() { isDragging = false; });
            canvas.addEventListener('mouseleave', function() { isDragging = false; });
            
            canvas.addEventListener('touchstart', function(e) {
                if (isLocked) {
                    const rect = canvas.getBoundingClientRect();
                    const touch = e.touches[0];
                    const x = touch.clientX - rect.left;
                    const y = touch.clientY - rect.top;
                    addCrosshair(x, y);
                } else {
                    isDragging = true;
                    lastX = e.touches[0].clientX - offsetX;
                    lastY = e.touches[0].clientY - offsetY;
                }
            });
            
            canvas.addEventListener('touchmove', function(e) {
                if (!isDragging || isLocked) return;
                e.preventDefault();
                offsetX = e.touches[0].clientX - lastX;
                offsetY = e.touches[0].clientY - lastY;
                drawImage();
                updateFloatCanvas();
            });
            
            canvas.addEventListener('touchend', function() { isDragging = false; });
            
            canvas.addEventListener('wheel', function(e) {
                if (isLocked) return;
                e.preventDefault();
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.left;
                const imgWidth = image.width * scale;
                const imgHeight = image.height * scale;
                const imgX = (canvas.width - imgWidth)/2 + offsetX;
                const imgY = (canvas.height - imgHeight)/2 + offsetY;
                const relX = mouseX - imgX;
                const relY = mouseY - imgY;
                const delta = e.deltaY > 0 ? -0.1 : 0.1;
                const newScale = Math.max(0.1, Math.min(20, scale + delta));
                const newImgWidth = image.width * newScale;
                const newImgHeight = image.height * newScale;
                const newImgX = (canvas.width - newImgWidth)/2 + offsetX;
                const newImgY = (canvas.height - newImgHeight)/2 + offsetY;
                offsetX += (mouseX - newImgX) - (mouseX - imgX) * (newScale/scale);
                offsetY += (mouseY - newImgY) - (mouseY - imgY) * (newScale/scale);
                scale = newScale;
                zoomSlider.value = scale;
                updateZoomValue();
                drawImage();
                updateFloatCanvas();
            });
            
            window.addEventListener('resize', resizeCanvas);
            updateFloatZoomValue();
            resizeCanvas();
        });
    </script>
</body>
</html>
